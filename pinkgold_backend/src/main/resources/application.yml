server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pinkgold_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  main:
    banner-mode: off

crac:
  enabled: false

# Thư mục lưu ảnh (tương đối so với thư mục chạy backend)
upload:
  dir: images