<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản Lý Danh Mục - PinkGold Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root{--gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8b6914;--pink:#d4637a;--cream:#faf6f0;--dark:#1a1208;--muted:#7b7468;--line:#f0e8d8;--bg:#f8f4ed;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);}

    .header{background:white;box-shadow:0 2px 10px rgba(0,0,0,.1);position:fixed;top:0;left:0;right:0;z-index:1000;height:70px;display:flex;align-items:center;padding:0 30px;}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--gold-dark);letter-spacing:2px;}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:20px;}
    .sidebar{position:fixed;left:0;top:70px;bottom:0;width:260px;background:var(--dark);color:#e8d9c0;padding:30px 20px;overflow-y:auto;}
    .sidebar a{color:#e8d9c0;text-decoration:none;display:flex;align-items:center;gap:12px;padding:12px 20px;border-radius:8px;margin-bottom:6px;transition:all .3s;}
    .sidebar a:hover,.sidebar a.active{background:var(--gold);color:var(--dark);}
    .main-content{margin-left:260px;margin-top:70px;padding:30px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--dark);margin-bottom:24px;}
    .card{background:white;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.08);padding:24px;margin-bottom:24px;}

    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;transition:all .2s;}
    .btn-gold{background:var(--gold);color:white;}
    .btn-gold:hover{background:var(--gold-dark);}
    .btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold-dark);}
    .btn-outline:hover{background:var(--gold);color:white;}

    .server-error{display:none;background:#fff4f4;border:1px solid #ffd4d4;color:#8a1f1f;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:.88rem;line-height:1.45;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:12px 16px;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#888;border-bottom:2px solid #f0e8d8;}
    td{padding:14px 16px;border-bottom:1px solid #f5f0e8;font-size:.9rem;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#fffbf5;}
    .img-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;}
    .img-placeholder{width:52px;height:52px;border-radius:8px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;color:#c5b99a;font-size:1.2rem;}
    .action-btn{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:6px;transition:background .2s;font-size:1rem;}
    .action-btn:hover{background:#f5f0e8;}
    .action-btn.edit{color:var(--gold-dark);}
    .action-btn.del{color:#dc3545;}
    .empty-state{text-align:center;padding:60px 20px;color:#aaa;}
    .search-bar{display:flex;gap:12px;margin-bottom:20px;}
    .search-bar input{flex:1;padding:10px 16px;border:1.5px solid #e8dfd0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;}
    .search-bar input:focus{border-color:var(--gold);}

    /* ── MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:white;border-radius:16px;padding:32px;width:520px;max-width:95%;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;margin-bottom:24px;}
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:6px;font-weight:500;}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid #e8dfd0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--dark);outline:none;transition:border-color .2s;}
    .form-control:focus{border-color:var(--gold);}
    .modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}

    /* ── UPLOAD ẢNH DANH MỤC (giống products.html) ── */
    .upload-section{
      border:1.5px dashed #e8dfd0;border-radius:10px;
      padding:18px 18px 14px;margin-bottom:18px;background:#fffdf8;
    }
    .upload-section-title{
      font-size:.74rem;letter-spacing:1px;text-transform:uppercase;
      color:var(--gold-dark);font-weight:600;margin-bottom:12px;
      display:flex;align-items:center;gap:7px;
    }
    .cert-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;}
    .cert-thumb{
      width:96px;height:96px;border-radius:8px;border:1.5px solid #e8dfd0;
      background:#f5f0e8;display:flex;align-items:center;justify-content:center;
      overflow:hidden;flex:none;position:relative;
    }
    .cert-thumb img{width:100%;height:100%;object-fit:cover;}
    .cert-thumb i{font-size:1.8rem;color:#c5b99a;}
    .cert-remove{
      position:absolute;top:-8px;right:-8px;
      width:22px;height:22px;border-radius:50%;
      background:#dc3545;color:white;border:none;cursor:pointer;
      font-size:.65rem;display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 6px rgba(0,0,0,.2);
    }
    .cert-info{flex:1;min-width:160px;}
    .cert-filename{font-size:.78rem;color:var(--muted);margin-bottom:8px;word-break:break-all;min-height:18px;}
    .file-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 16px;border:1.5px solid var(--gold);
      color:var(--gold-dark);border-radius:8px;cursor:pointer;
      font-size:.8rem;font-weight:500;background:white;transition:all .2s;
    }
    .file-btn:hover{background:var(--gold);color:white;}
    input[type=file]{display:none;}
    .upload-status{font-size:.74rem;margin-top:7px;min-height:18px;}
    .upload-status.uploading{color:var(--gold-dark);}
    .upload-status.success{color:#155724;}
    .upload-status.error{color:#dc3545;}
  </style>
</head>
<body>

<header class="header">
  <div class="logo">PINKGOLD</div>
  <div class="nav-right">
    <span style="color:var(--gold-dark);font-weight:500;" id="adminName">Admin</span>
    <a href="login-admin.html" onclick="logout()" style="color:#666;text-decoration:none;cursor:pointer;">
      <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>
  </div>
</header>

<aside class="sidebar">
  <a href="products.html"><i class="bi bi-gem"></i> Quản Lý Sản Phẩm</a>
  <a href="categories.html" class="active"><i class="bi bi-tags"></i> Quản Lý Danh Mục</a>
  <a href="orders.html"><i class="bi bi-cart"></i> Quản Lý Đơn Hàng</a>
  <a href="customers.html"><i class="bi bi-people"></i> Quản Lý Khách Hàng</a>
  <a href="vouchers.html"><i class="bi bi-ticket-perforated"></i> Mã Giảm Giá</a>
  <a href="reports.html"><i class="bi bi-graph-up"></i> Báo Cáo Thống Kê</a>
  <hr style="border-color:#444;margin:25px 0;">
  <a href="login-admin.html" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</a>
</aside>

<main class="main-content">
  <h1 class="page-title">Quản Lý Danh Mục</h1>

  <div class="card">
    <div id="serverError" class="server-error"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:16px;">
      <div class="search-bar" style="margin:0;flex:1;max-width:400px;">
        <input type="text" id="searchInput" placeholder="Tìm kiếm danh mục..." oninput="filterCategories()">
      </div>
      <button class="btn btn-gold" onclick="openModal()">
        <i class="bi bi-plus-lg"></i> Thêm Danh Mục
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Ảnh</th>
          <th>Tên Danh Mục</th>
          <th>Mô Tả</th>
          <th>Số SP</th>
          <th>Ngày Tạo</th>
          <th>Thao Tác</th>
        </tr>
      </thead>
      <tbody id="categoryTableBody">
        <tr><td colspan="6" class="empty-state">Đang tải dữ liệu...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL THÊM / SỬA DANH MỤC -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">Thêm Danh Mục Mới</h2>
    <input type="hidden" id="categoryId">

    <div class="form-group">
      <label class="form-label">Tên Danh Mục *</label>
      <input type="text" class="form-control" id="catName" placeholder="VD: Nhẫn, Dây Chuyền...">
    </div>
    <div class="form-group">
      <label class="form-label">Mô Tả</label>
      <textarea class="form-control" id="catDesc" rows="3" placeholder="Mô tả ngắn về danh mục..."></textarea>
    </div>

    <!-- UPLOAD ẢNH DANH MỤC -->
    <div class="upload-section">
      <div class="upload-section-title">
        <i class="bi bi-image"></i>
        Ảnh Danh Mục <span style="font-weight:400;color:#aaa;">(1 ảnh, lưu vào images/)</span>
      </div>
      <div class="cert-row">
        <div class="cert-thumb" id="catThumb">
          <i class="bi bi-image"></i>
        </div>
        <div class="cert-info">
          <div class="cert-filename" id="catFilename">Chưa có ảnh</div>
          <label class="file-btn" for="catFileInput">
            <i class="bi bi-upload"></i> Chọn ảnh
          </label>
          <input type="file" id="catFileInput" accept="image/*" onchange="uploadCatImage(event)">
          <div class="upload-status" id="catUploadStatus"></div>
        </div>
      </div>
      <input type="hidden" id="catImage">
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-gold" onclick="saveCategory()">
        <i class="bi bi-check-lg"></i> Lưu
      </button>
    </div>
  </div>
</div>

<script>
const API     = localStorage.getItem('API_BASE') || 'http://localhost:8080/api';
const IMG_BASE = 'http://localhost:8080';

let allCategories = [];

/* ── Admin name ── */
const admin = JSON.parse(localStorage.getItem('user') || '{}');
if (admin.fullName || admin.fullname) {
  document.getElementById('adminName').textContent = admin.fullName || admin.fullname;
}

/* ── URL ảnh đầy đủ ── */
function imgUrl(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  return `${IMG_BASE}/${path.replace(/^\//, '')}`;
}

/* ── Escape helpers ── */
function esc(v) {
  return String(v).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
  );
}
function escJs(v) {
  return String(v).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

/* ── Fetch helper ── */
async function fetchJson(path) {
  const url = `${API}${path}`;
  let res;
  try {
    res = await fetch(url, { headers: { Accept: 'application/json' } });
  } catch (e) {
    throw new Error(`Không gọi được ${url}. Kiểm tra backend đã chạy, đúng port 8080, CORS.`);
  }
  const text = await res.text();
  if (!res.ok) throw new Error(`${url} trả HTTP ${res.status}${text ? ': ' + text.slice(0, 300) : ''}`);
  try {
    const data = text ? JSON.parse(text) : [];
    return Array.isArray(data) ? data : (data.content || data.data || []);
  } catch {
    throw new Error(`${url} không trả JSON hợp lệ. Đoạn đầu: ${text.slice(0, 200)}`);
  }
}

/* ══════════════════════════════════════════
   LOAD / RENDER
══════════════════════════════════════════ */
async function loadCategories() {
  hideServerError();
  document.getElementById('categoryTableBody').innerHTML =
    `<tr><td colspan="6" class="empty-state">Đang tải dữ liệu...</td></tr>`;
  try {
    allCategories = await fetchJson('/categories');
    renderTable(allCategories);
  } catch (e) {
    allCategories = [];
    showServerError(e.message);
    renderTable([]);
  }
}

function filterCategories() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  renderTable(allCategories.filter(c => String(c.name || '').toLowerCase().includes(kw)));
}

function getCategoryImage(c) { return c.imageUrl || c.image_url || ''; }
function getCategoryDate(c)  { return c.createdAt || c.created_at || ''; }
function getProductCount(c) {
  if (typeof c.productCount === 'number') return c.productCount;
  if (typeof c.product_count === 'number') return c.product_count;
  if (Array.isArray(c.products)) return c.products.length;
  return 0;
}

function renderTable(data) {
  const tbody = document.getElementById('categoryTableBody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
      <i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:8px;"></i>
      Chưa có danh mục nào
    </td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(c => {
    const id       = Number(c.id);
    const name     = esc(c.name || '');
    const desc     = esc(c.description || '-');
    const imageUrl = getCategoryImage(c);
    const fullImg  = esc(imgUrl(imageUrl));
    const dateText = getCategoryDate(c)
      ? new Date(getCategoryDate(c)).toLocaleDateString('vi-VN') : '-';

    return `
      <tr>
        <td>
          ${fullImg
            ? `<img src="${fullImg}" class="img-thumb" alt="${name}"
                   onerror="this.outerHTML='<div class=&quot;img-placeholder&quot;><i class=&quot;bi bi-image&quot;></i></div>'">`
            : `<div class="img-placeholder"><i class="bi bi-image"></i></div>`}
        </td>
        <td style="font-weight:500;">${name}</td>
        <td style="color:#666;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${desc}</td>
        <td>${getProductCount(c)} sản phẩm</td>
        <td style="color:#999;font-size:.82rem;">${esc(dateText)}</td>
        <td>
          <button class="action-btn edit" onclick="editCategory(${id})" title="Sửa"><i class="bi bi-pencil"></i></button>
          <button class="action-btn del"  onclick="deleteCategory(${id}, '${escJs(c.name || '')}')" title="Xóa"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
  }).join('');
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function openModal(cat = null) {
  document.getElementById('modalTitle').textContent  = cat ? 'Chỉnh Sửa Danh Mục' : 'Thêm Danh Mục Mới';
  document.getElementById('categoryId').value        = cat ? cat.id : '';
  document.getElementById('catName').value           = cat ? (cat.name || '') : '';
  document.getElementById('catDesc').value           = cat ? (cat.description || '') : '';

  const imgVal = cat ? getCategoryImage(cat) : '';
  document.getElementById('catImage').value = imgVal;
  renderCatPreview(imgVal);
  document.getElementById('catUploadStatus').textContent = '';
  document.getElementById('catUploadStatus').className   = 'upload-status';

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function editCategory(id) {
  const cat = allCategories.find(c => Number(c.id) === Number(id));
  if (cat) openModal(cat);
}

/* ══════════════════════════════════════════
   UPLOAD ẢNH DANH MỤC
══════════════════════════════════════════ */
function renderCatPreview(url) {
  const box  = document.getElementById('catThumb');
  const fnEl = document.getElementById('catFilename');
  if (url) {
    const full = imgUrl(url);
    box.innerHTML = `
      <img src="${esc(full)}"
           onerror="this.outerHTML='<i class=&quot;bi bi-image&quot;></i>'">
      <button class="cert-remove" onclick="removeCatImage()" title="Xóa ảnh">
        <i class="bi bi-x"></i>
      </button>`;
    fnEl.textContent = url.split('/').pop();
  } else {
    box.innerHTML = `<i class="bi bi-image"></i>`;
    fnEl.textContent = 'Chưa có ảnh';
  }
}

function removeCatImage() {
  const url = document.getElementById('catImage').value;
  if (url) {
    fetch(`${API}/upload?url=${encodeURIComponent(url)}`, { method: 'DELETE' }).catch(() => {});
  }
  document.getElementById('catImage').value = '';
  renderCatPreview('');
}

async function uploadCatImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const statusEl = document.getElementById('catUploadStatus');
  statusEl.textContent = 'Đang tải lên...';
  statusEl.className   = 'upload-status uploading';

  /* Xóa ảnh cũ nếu có */
  const oldUrl = document.getElementById('catImage').value;
  if (oldUrl) {
    fetch(`${API}/upload?url=${encodeURIComponent(oldUrl)}`, { method: 'DELETE' }).catch(() => {});
  }

  try {
    const form = new FormData();
    form.append('file', file);

    const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const data = await res.json();
    const url  = data.url || data.path || data.imageUrl;
    if (!url) throw new Error('Server không trả về đường dẫn ảnh.');

    document.getElementById('catImage').value = url;
    renderCatPreview(url);
    statusEl.textContent = '✓ Tải lên thành công';
    statusEl.className   = 'upload-status success';
  } catch (e) {
    statusEl.textContent = `Lỗi: ${e.message}`;
    statusEl.className   = 'upload-status error';
  } finally {
    event.target.value = '';
  }
}

/* ══════════════════════════════════════════
   SAVE / DELETE
══════════════════════════════════════════ */
async function saveCategory() {
  const id   = document.getElementById('categoryId').value;
  const name = document.getElementById('catName').value.trim();
  if (!name) { alert('Vui lòng nhập tên danh mục!'); return; }

  const body = {
    name,
    description: document.getElementById('catDesc').value,
    imageUrl:    document.getElementById('catImage').value || null
  };

  try {
    const url    = id ? `${API}/categories/${id}` : `${API}/categories`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    closeModal();
    await loadCategories();
    alert(id ? 'Cập nhật thành công!' : 'Thêm danh mục thành công!');
  } catch (e) {
    alert(`Lỗi khi lưu danh mục: ${e.message}`);
  }
}

async function deleteCategory(id, name) {
  if (!confirm(`Bạn có chắc muốn xóa danh mục "${name}"?`)) return;
  try {
    const res = await fetch(`${API}/categories/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    await loadCategories();
    alert('Đã xóa danh mục!');
  } catch (e) {
    alert(`Không thể xóa danh mục: ${e.message}`);
  }
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function showServerError(msg) {
  const b = document.getElementById('serverError');
  b.textContent = msg;
  b.style.display = 'block';
}
function hideServerError() {
  const b = document.getElementById('serverError');
  b.textContent = '';
  b.style.display = 'none';
}
function logout() {
  if (confirm('Bạn có chắc muốn đăng xuất?')) {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login-admin.html';
  }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadCategories();
</script>
</body>
</html>
