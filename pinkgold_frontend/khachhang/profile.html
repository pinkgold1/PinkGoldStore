<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tài Khoản Của Tôi - PinkGold</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8b6914;
      --gold-pale: #fdf5e4; --pink: #d4637a; --cream: #faf6f0;
      --cream-dark: #f2ebe0; --dark: #1a1208; --dark-mid: #2d1a05;
      --text: #1a1208; --text-muted: #8a7a60; --line: #ede4d4;
      --shadow: 0 4px 20px rgba(26,18,8,.08); --shadow-lg: 0 8px 40px rgba(26,18,8,.14);
      --radius: 8px; --radius-lg: 12px; --transition: all .25s ease;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 70px; display: flex; align-items: center; padding: 0 40px; gap: 24px;
      background: rgba(250,246,240,.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,.2); box-shadow: 0 2px 20px rgba(26,18,8,.07);
    }
    .navbar-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 600; color: var(--gold-dark); letter-spacing: 4px; }
    .navbar-nav { display: flex; gap: 4px; list-style: none; margin: 0 auto; }
    .navbar-nav a { display: block; padding: 8px 12px; border-radius: 6px; font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); transition: var(--transition); }
    .navbar-nav a:hover { color: var(--gold-dark); background: var(--gold-pale); }
    .navbar-actions { display: flex; align-items: center; gap: 6px; flex: none; }
    .nav-icon-btn { position: relative; width: 40px; height: 40px; border-radius: 50%; background: none; border: none; color: var(--text); font-size: 1.05rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); cursor: pointer; }
    .nav-icon-btn:hover { background: var(--gold-pale); color: var(--gold-dark); }
    .nav-badge { position: absolute; top: 2px; right: 2px; background: var(--pink); color: white; width: 17px; height: 17px; border-radius: 50%; font-size: .58rem; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 2px solid var(--cream); }
    .nav-user-btn { display: flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 20px; background: none; border: 1.5px solid var(--line); font-size: .8rem; color: var(--text); transition: var(--transition); cursor: pointer; white-space: nowrap; }
    .nav-user-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
    .user-dropdown { position: relative; }
    .user-menu { display: none; position: absolute; right: 0; top: calc(100% + 10px); background: white; border: 1.5px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-lg); min-width: 190px; overflow: hidden; z-index: 300; }
    .user-menu.open { display: block; animation: fadeUp .15s ease; }
    .user-menu a, .user-menu button { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: .875rem; color: var(--text); transition: background .15s; text-decoration: none; background: none; border: none; width: 100%; cursor: pointer; font-family: inherit; text-align: left; }
    .user-menu a:hover, .user-menu button:hover { background: var(--gold-pale); }
    .user-menu .divider { height: 1px; background: var(--line); margin: 4px 0; }
    .user-menu .logout { color: var(--pink); }

    /* ===== PAGE LAYOUT ===== */
    .page-wrapper { padding-top: 70px; min-height: 100vh; }
    .page-header {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%);
      padding: 48px 0 40px; position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,.12) 0%, transparent 70%);
    }
    .page-header-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 2; }
    .page-eyebrow { font-size: .62rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 400; color: white; }

    .content-area { max-width: 1200px; margin: 0 auto; padding: 40px 40px 80px; display: grid; grid-template-columns: 260px 1fr; gap: 32px; align-items: start; }

    /* ===== SIDEBAR ===== */
    .sidebar { background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); position: sticky; top: 90px; }
    .sidebar-avatar {
      background: linear-gradient(135deg, var(--dark), var(--dark-mid));
      padding: 32px 24px; text-align: center;
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--dark);
      border: 3px solid rgba(201,168,76,.4);
    }
    .sidebar-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: white; font-weight: 400; }
    .sidebar-email { font-size: .78rem; color: rgba(255,255,255,.45); margin-top: 4px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 24px; font-size: .85rem; color: var(--text-muted);
      transition: var(--transition); border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover { color: var(--gold-dark); background: var(--gold-pale); }
    .sidebar-nav a.active { color: var(--gold-dark); background: var(--gold-pale); border-left-color: var(--gold); font-weight: 500; }
    .sidebar-nav a i { font-size: 1rem; width: 18px; text-align: center; }
    .sidebar-nav .divider { height: 1px; background: var(--line); margin: 8px 0; }
    .sidebar-nav .logout { color: var(--pink); }
    .sidebar-nav .logout:hover { background: #fff0f3; }

    /* ===== MAIN CONTENT ===== */
    .main-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; animation: fadeUp .4s ease; }
    .card-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .card-header-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; }
    .card-body { padding: 28px; }

    /* ===== TABS ===== */
    .tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--line); padding: 0 28px; }
    .tab-btn {
      padding: 14px 18px; background: none; border: none; border-bottom: 2px solid transparent;
      font-family: 'DM Sans', sans-serif; font-size: .78rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted); cursor: pointer;
      transition: var(--transition); margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--gold-dark); border-bottom-color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== FORM ===== */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 0; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { display: block; font-size: .7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 7px; }
    .form-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--line);
      border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
      font-size: .9rem; color: var(--text); outline: none; background: white;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input:disabled { background: var(--cream); color: var(--text-muted); cursor: not-allowed; }
    .form-hint { font-size: .75rem; color: var(--text-muted); margin-top: 5px; }
    .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--line); }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: var(--radius); border: none; font-size: .75rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; transition: var(--transition); cursor: pointer; }
    .btn-gold { background: var(--gold); color: var(--dark); }
    .btn-gold:hover { background: var(--gold-dark); color: white; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,.35); }
    .btn-outline { background: transparent; border: 1.5px solid var(--line); color: var(--text-muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* ===== PASSWORD STRENGTH ===== */
    .pwd-strength { margin-top: 6px; display: flex; gap: 4px; }
    .pwd-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--line); transition: background .3s; }
    .pwd-bar.weak { background: var(--pink); }
    .pwd-bar.medium { background: var(--gold); }
    .pwd-bar.strong { background: #3a7a44; }
    .pwd-label { font-size: .72rem; color: var(--text-muted); margin-top: 5px; }

    /* ===== ALERT ===== */
    .alert { padding: 12px 16px; border-radius: var(--radius); font-size: .85rem; margin-bottom: 20px; display: none; }
    .alert.show { display: flex; align-items: center; gap: 10px; }
    .alert-success { background: #f0fff4; color: #166534; border-left: 3px solid #3a7a44; }
    .alert-error { background: #fff0f3; color: #8a1f2e; border-left: 3px solid var(--pink); }

    /* ===== TOAST ===== */
    .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 13px 20px; border-radius: var(--radius); font-size: .85rem; font-weight: 500; animation: fadeUp .3s ease; box-shadow: var(--shadow-lg); max-width: 340px; }
    .toast-success { background: var(--dark); color: var(--gold-light); border-left: 3px solid var(--gold); }
    .toast-error { background: #2d0810; color: #f0a0b0; border-left: 3px solid var(--pink); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .navbar { padding: 0 20px; }
      .navbar-nav { display: none; }
      .content-area { grid-template-columns: 1fr; padding: 24px 20px 60px; }
      .sidebar { position: static; }
      .page-header-inner { padding: 0 20px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="navbar-logo">PINKGOLD</a>
  <ul class="navbar-nav">
    <li><a href="index.html">Trang Chủ</a></li>
    <li><a href="products.html">Sản Phẩm</a></li>
    <li><a href="products.html?cat=6">Trang Sức Cưới</a></li>
  </ul>
  <div class="navbar-actions">
    <button class="nav-icon-btn" onclick="location.href='cart.html'" title="Giỏ hàng">
      <i class="bi bi-bag"></i>
      <span class="nav-badge" id="cartBadge" style="display:none">0</span>
    </button>
    <div id="navUserArea"></div>
  </div>
</nav>

<div class="page-wrapper">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-inner">
      <span class="page-eyebrow">Cá Nhân</span>
      <h1 class="page-title">Tài Khoản Của Tôi</h1>
    </div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-avatar">
        <div class="avatar-circle" id="sidebarAvatar">–</div>
        <div class="sidebar-name" id="sidebarName">Đang tải...</div>
        <div class="sidebar-email" id="sidebarEmail"></div>
      </div>
      <nav class="sidebar-nav">
        <a href="profile.html" class="active"><i class="bi bi-person"></i> Thông Tin Cá Nhân</a>
        <a href="order-tracking.html "><i class="bi bi-bag"></i> Đơn Hàng Của Tôi</a>
        <div class="divider"></div>
        <a href="#" class="logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main-card">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('info', this)">Thông Tin</button>
        <button class="tab-btn" onclick="switchTab('password', this)">Đổi Mật Khẩu</button>
      </div>

      <!-- Tab: Thông tin -->
      <div class="tab-panel active" id="tab-info">
        <div class="card-body">
          <div class="alert" id="infoAlert"></div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Họ và Tên</label>
              <input type="text" class="form-input" id="fullName" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
              <label class="form-label">Tên Đăng Nhập</label>
              <input type="text" class="form-input" id="username" disabled>
              <div class="form-hint">Tên đăng nhập không thể thay đổi.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
              <label class="form-label">Số Điện Thoại</label>
              <input type="tel" class="form-input" id="phone" placeholder="0987 654 321">
            </div>
            <div class="form-group">
              <label class="form-label">Ngày Sinh</label>
              <input type="date" class="form-input" id="dateOfBirth">
            </div>
            <div class="form-group full">
              <label class="form-label">Địa Chỉ</label>
              <textarea class="form-input" id="address" rows="3" placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố..."></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-outline" onclick="loadProfile()"><i class="bi bi-arrow-counterclockwise"></i> Huỷ</button>
            <button class="btn btn-gold" onclick="saveProfile()"><i class="bi bi-check-lg"></i> Lưu Thay Đổi</button>
          </div>
        </div>
      </div>

      <!-- Tab: Đổi mật khẩu -->
      <div class="tab-panel" id="tab-password">
        <div class="card-body">
          <div class="alert" id="pwdAlert"></div>
          <div class="form-grid">
            <div class="form-group full">
              <label class="form-label">Mật Khẩu Hiện Tại</label>
              <input type="password" class="form-input" id="oldPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
              <label class="form-label">Mật Khẩu Mới</label>
              <input type="password" class="form-input" id="newPassword" placeholder="Tối thiểu 6 ký tự" oninput="checkStrength()">
              <div class="pwd-strength"><div class="pwd-bar" id="b1"></div><div class="pwd-bar" id="b2"></div><div class="pwd-bar" id="b3"></div></div>
              <div class="pwd-label" id="pwdLabel"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Xác Nhận Mật Khẩu Mới</label>
              <input type="password" class="form-input" id="confirmPassword" placeholder="Nhập lại mật khẩu mới">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-outline" onclick="clearPwdForm()"><i class="bi bi-x"></i> Huỷ</button>
            <button class="btn btn-gold" onclick="changePassword()"><i class="bi bi-shield-lock"></i> Đổi Mật Khẩu</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:8080/api';
const CART_KEY = 'pinkgold_cart';

/* ===== CART BADGE ===== */
function cartTotal() {
  try { return (JSON.parse(localStorage.getItem(CART_KEY)) || []).reduce((s, i) => s + (i.quantity || 0), 0); } catch { return 0; }
}
function updateCartBadge() {
  const total = cartTotal();
  const b = document.getElementById('cartBadge');
  if (!b) return;
  b.textContent = total;
  b.style.display = total > 0 ? 'flex' : 'none';
}

/* ===== TOAST ===== */
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 2800);
  setTimeout(() => t.remove(), 3200);
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.className = `alert alert-${type} show`;
  el.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
}
function hideAlert(id) {
  document.getElementById(id).className = 'alert';
}

/* ===== NAVBAR USER ===== */
function renderNavUser() {
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  const area = document.getElementById('navUserArea');
  if (!area) return;
  if (user) {
    const name = user.fullName || user.username || 'Tài khoản';
    area.innerHTML = `
      <div class="user-dropdown">
        <button class="nav-user-btn" onclick="toggleUserMenu(event)">
          <i class="bi bi-person-circle"></i><span>${name}</span>
          <i class="bi bi-chevron-down" style="font-size:.6rem;"></i>
        </button>
        <div class="user-menu" id="userMenu">
          <a href="profile.html"><i class="bi bi-person"></i> Tài Khoản</a>
          <a href="orders.html"><i class="bi bi-bag"></i> Đơn Hàng Của Tôi</a>
          <div class="divider"></div>
          <button class="logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</button>
        </div>
      </div>`;
  } else {
    area.innerHTML = `<a href="login.html" class="btn btn-gold" style="padding:8px 16px;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;border-radius:8px;background:var(--gold);color:var(--dark);font-family:inherit;"><i class="bi bi-person"></i> Đăng Nhập</a>`;
  }
}
function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userMenu')?.classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('userMenu')?.classList.remove('open'));

function logout() {
  if (confirm('Bạn có chắc muốn đăng xuất?')) {
    localStorage.removeItem('user'); localStorage.removeItem('token');
    location.href = 'index.html';
  }
}

/* ===== TABS ===== */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

/* ===== LOAD PROFILE ===== */
let currentUser = null;

async function loadProfile() {
  const stored = JSON.parse(localStorage.getItem('user') || 'null');
  if (!stored) { location.href = 'login.html'; return; }

  // Fill sidebar immediately from localStorage
  fillSidebar(stored);

  try {
    const res = await fetch(`${API}/users/${stored.id}`);
    if (res.ok) {
      currentUser = await res.json();
      localStorage.setItem('user', JSON.stringify({ ...stored, ...currentUser }));
    } else {
      currentUser = stored;
    }
  } catch {
    currentUser = stored;
  }

  fillForm(currentUser);
  fillSidebar(currentUser);
}

function fillSidebar(u) {
  const name = u.fullName || u.fullname || u.username || 'Khách hàng';
  const initials = name.trim().split(/\s+/).slice(-2).map(w => w[0].toUpperCase()).join('');
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarEmail').textContent = u.email || '';
}

function fillForm(u) {
  document.getElementById('fullName').value = u.fullName || u.fullname || '';
  document.getElementById('username').value = u.username || '';
  document.getElementById('email').value = u.email || '';
  document.getElementById('phone').value = u.phone || '';
  document.getElementById('address').value = u.address || '';
  document.getElementById('dateOfBirth').value = u.dateOfBirth ? String(u.dateOfBirth).slice(0, 10) : '';
}

/* ===== SAVE PROFILE ===== */
async function saveProfile() {
  hideAlert('infoAlert');
  const stored = JSON.parse(localStorage.getItem('user') || 'null');
  if (!stored?.id) return;

  const body = {
    fullName: document.getElementById('fullName').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    address: document.getElementById('address').value.trim(),
    dateOfBirth: document.getElementById('dateOfBirth').value || null,
  };

  if (!body.fullName) { showAlert('infoAlert', 'Vui lòng nhập họ và tên.', 'error'); return; }
  if (!body.email) { showAlert('infoAlert', 'Vui lòng nhập email.', 'error'); return; }

  try {
    const res = await fetch(`${API}/users/me`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const updated = await res.json().catch(() => body);
      localStorage.setItem('user', JSON.stringify({ ...stored, ...updated }));
      fillSidebar({ ...stored, ...updated });
      renderNavUser();
      showAlert('infoAlert', 'Cập nhật thông tin thành công!', 'success');
      showToast('Đã lưu thông tin cá nhân');
    } else {
      const msg = await res.text();
      showAlert('infoAlert', msg || 'Không thể cập nhật. Vui lòng thử lại.', 'error');
    }
  } catch {
    showAlert('infoAlert', 'Lỗi kết nối server. Vui lòng thử lại.', 'error');
  }
}

/* ===== PASSWORD ===== */
function checkStrength() {
  const val = document.getElementById('newPassword').value;
  const bars = [document.getElementById('b1'), document.getElementById('b2'), document.getElementById('b3')];
  const label = document.getElementById('pwdLabel');
  bars.forEach(b => { b.className = 'pwd-bar'; });
  if (!val) { label.textContent = ''; return; }
  let score = 0;
  if (val.length >= 6) score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  if (val.length >= 10 && /[^a-zA-Z0-9]/.test(val)) score++;
  const levels = ['weak', 'medium', 'strong'];
  const texts = ['Yếu', 'Trung bình', 'Mạnh'];
  for (let i = 0; i < score; i++) bars[i].classList.add(levels[score - 1]);
  label.textContent = texts[score - 1] || '';
}

async function changePassword() {
  hideAlert('pwdAlert');
  const oldPwd = document.getElementById('oldPassword').value;
  const newPwd = document.getElementById('newPassword').value;
  const confirmPwd = document.getElementById('confirmPassword').value;

  if (!oldPwd) { showAlert('pwdAlert', 'Vui lòng nhập mật khẩu hiện tại.', 'error'); return; }
  if (newPwd.length < 6) { showAlert('pwdAlert', 'Mật khẩu mới tối thiểu 6 ký tự.', 'error'); return; }
  if (newPwd !== confirmPwd) { showAlert('pwdAlert', 'Mật khẩu mới không khớp.', 'error'); return; }

  try {
    // Đổi thành:
    const stored = JSON.parse(localStorage.getItem('user') || '{}');
    const res = await fetch(`${API}/users/me/change-password?userId=${stored.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
    });

    if (res.ok) {
      showAlert('pwdAlert', 'Đổi mật khẩu thành công!', 'success');
      showToast('Mật khẩu đã được cập nhật');
      clearPwdForm();
    } else {
      const msg = await res.text();
      showAlert('pwdAlert', msg || 'Mật khẩu hiện tại không đúng.', 'error');
    }
  } catch {
    showAlert('pwdAlert', 'Lỗi kết nối server.', 'error');
  }
}

function clearPwdForm() {
  ['oldPassword', 'newPassword', 'confirmPassword'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('b1').className = document.getElementById('b2').className = document.getElementById('b3').className = 'pwd-bar';
  document.getElementById('pwdLabel').textContent = '';
  hideAlert('pwdAlert');
}

updateCartBadge();
loadProfile();
