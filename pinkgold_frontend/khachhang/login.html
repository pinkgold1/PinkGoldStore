<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập - PinkGold</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root{--gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8b6914;--pink:#d4637a;--cream:#faf6f0;--cream-2:#f5efe4;--dark:#1a1208;--dark-mid:#2d2010;--muted:#8a7a60;--line:rgba(201,168,76,0.2);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow:hidden;}

    /* LEFT PANEL */
    .left-panel{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,#1a1208 0%,#2d1a05 50%,#3d2210 100%);}
    .left-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 30% 60%,rgba(201,168,76,0.15),transparent 70%),radial-gradient(ellipse 40% 60% at 70% 30%,rgba(212,99,122,0.1),transparent 70%);}
    .ornament{position:absolute;inset:40px;border:1px solid rgba(201,168,76,0.15);}
    .ornament::before{content:'';position:absolute;inset:20px;border:1px solid rgba(201,168,76,0.08);}
    .oc{position:absolute;width:36px;height:36px;border-color:var(--gold);border-style:solid;}
    .oc.tl{top:28px;left:28px;border-width:2px 0 0 2px;}
    .oc.tr{top:28px;right:28px;border-width:2px 2px 0 0;}
    .oc.bl{bottom:28px;left:28px;border-width:0 0 2px 2px;}
    .oc.br{bottom:28px;right:28px;border-width:0 2px 2px 0;}
    .brand-center{position:relative;z-index:2;text-align:center;animation:fadeUp .8s ease forwards;}
    .brand-logo{width:70px;height:70px;margin:0 auto 20px;}
    .brand-logo svg{width:100%;height:100%;filter:drop-shadow(0 0 16px rgba(201,168,76,0.4));}
    .brand-name{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:600;color:var(--gold-light);letter-spacing:6px;line-height:1;text-shadow:0 0 40px rgba(201,168,76,0.3);}
    .brand-tagline{font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:10px;}
    .brand-divider{display:flex;align-items:center;gap:12px;margin:20px auto;width:180px;}
    .brand-divider span{flex:1;height:1px;background:rgba(201,168,76,0.25);}
    .brand-divider i{color:var(--gold);font-size:7px;}
    .brand-desc{color:rgba(255,255,255,0.3);font-size:0.82rem;line-height:1.8;max-width:260px;margin:0 auto;}
    .particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.6),transparent);animation:float linear infinite;pointer-events:none;}
    @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:.4;}100%{transform:translateY(-20px) scale(1);opacity:0;}}
    @keyframes fadeUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}

    /* RIGHT PANEL */
    .right-panel{width:460px;background:var(--cream);display:flex;align-items:center;justify-content:center;padding:60px 48px;position:relative;animation:slideIn .7s cubic-bezier(.16,1,.3,1) forwards;}
    @keyframes slideIn{from{transform:translateX(50px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    .right-panel::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);}
    .form-container{width:100%;}
    .form-subtitle{font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:8px;}
    .form-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:400;color:var(--dark);line-height:1.1;margin-bottom:28px;}
    .form-title em{font-style:italic;color:var(--pink);}

    .alert-box{padding:11px 14px;border-radius:6px;font-size:0.82rem;margin-bottom:20px;display:none;animation:fadeUp .25s ease;}
    .alert-box.danger{background:#fff0f3;color:#c0152e;border-left:3px solid #c0152e;}
    .alert-box.success{background:#f0fff4;color:#166534;border-left:3px solid #166534;}
    .alert-box.show{display:block;}

    .field-group{margin-bottom:20px;}
    .field-label{display:block;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:500;color:var(--muted);margin-bottom:7px;}
    .field-wrap{position:relative;}
    .field-wrap input{width:100%;height:50px;padding:0 44px 0 14px;border:1.5px solid #e8dfd0;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--dark);background:white;outline:none;transition:all .2s;}
    .field-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
    .field-wrap input.error-input{border-color:var(--pink);}
    .field-wrap input::placeholder{color:#c5b99a;}
    .field-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#c5b99a;font-size:1rem;cursor:pointer;transition:color .2s;user-select:none;}
    .field-icon:hover{color:var(--gold);}
    .field-error{font-size:0.72rem;color:var(--pink);margin-top:4px;display:none;}
    .field-error.show{display:block;}

    .form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
    .remember-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;color:var(--muted);}
    .remember-label input[type=checkbox]{appearance:none;width:15px;height:15px;border:1.5px solid #d4c9b0;border-radius:3px;cursor:pointer;transition:all .2s;position:relative;}
    .remember-label input[type=checkbox]:checked{background:var(--gold);border-color:var(--gold);}
    .remember-label input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:10px;color:white;}
    .forgot-link{font-size:0.78rem;color:var(--gold-dark);text-decoration:none;transition:color .2s;}
    .forgot-link:hover{color:var(--gold);}

    .btn-submit{width:100%;height:52px;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--dark);cursor:pointer;position:relative;overflow:hidden;transition:all .3s;box-shadow:0 4px 16px rgba(201,168,76,0.28);}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,0.38);}
    .btn-submit:active{transform:translateY(0);}
    .btn-submit.loading{pointer-events:none;opacity:.8;}
    .btn-submit .spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:var(--dark);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
    .btn-submit.loading .btn-text{display:none;}
    .btn-submit.loading .spinner{display:block;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .form-footer{text-align:center;margin-top:24px;font-size:0.8rem;color:var(--muted);}
    .form-footer a{color:var(--gold-dark);font-weight:500;text-decoration:none;}
    .form-footer a:hover{color:var(--gold);}
    .back-home{position:absolute;top:20px;left:20px;display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--muted);text-decoration:none;transition:color .2s;}
    .back-home:hover{color:var(--gold-dark);}

    .divider-or{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:0.72rem;}
    .divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--line);}

    @media(max-width:860px){
      .left-panel{display:none;}
      .right-panel{width:100%;animation:none;padding:40px 24px;}
      .right-panel::before{display:none;}
      body{background:var(--cream);}
    }
  </style>
</head>
<body>

<div class="left-panel">
  <div class="ornament"></div>
  <div class="oc tl"></div><div class="oc tr"></div>
  <div class="oc bl"></div><div class="oc br"></div>
  <div class="brand-center">
    <div class="brand-logo">
      <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="35" cy="35" r="33" stroke="url(#g1)" stroke-width="1.5"/>
        <path d="M35 10L45 26L60 26L49 38L53 56L35 46L17 56L21 38L10 26L25 26Z" fill="url(#g2)" opacity=".8"/>
        <circle cx="35" cy="35" r="7" fill="none" stroke="url(#g1)" stroke-width="1"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="70" y2="70"><stop offset="0%" stop-color="#e8c97a"/><stop offset="100%" stop-color="#c9a84c"/></linearGradient>
          <linearGradient id="g2" x1="0" y1="0" x2="70" y2="70"><stop offset="0%" stop-color="#f0d080"/><stop offset="100%" stop-color="#c9a84c"/></linearGradient>
        </defs>
      </svg>
    </div>
    <div class="brand-name">PINKGOLD</div>
    <div class="brand-tagline">Trang Sức Cao Cấp</div>
    <div class="brand-divider"><span></span><i>◆</i><span></span></div>
    <p class="brand-desc">Chào mừng bạn trở lại!<br>Đăng nhập để khám phá<br>những ưu đãi độc quyền.</p>
  </div>
  <div class="particle" style="width:4px;height:4px;left:12%;animation-duration:9s;animation-delay:0s;"></div>
  <div class="particle" style="width:3px;height:3px;left:32%;animation-duration:13s;animation-delay:2s;"></div>
  <div class="particle" style="width:5px;height:5px;left:58%;animation-duration:11s;animation-delay:4s;"></div>
  <div class="particle" style="width:2px;height:2px;left:78%;animation-duration:8s;animation-delay:1.5s;"></div>
</div>

<div class="right-panel">
  <a href="index.html" class="back-home"><i class="bi bi-arrow-left"></i> Trang chủ</a>
  <div class="form-container">
    <p class="form-subtitle">Tài khoản</p>
    <h1 class="form-title">Xin chào,<br><em>trở lại nào!</em></h1>

    <div class="alert-box" id="alertBox"></div>

    <form id="loginForm" novalidate onsubmit="handleLogin(event)">
      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <div class="field-wrap">
          <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
          <span class="field-icon">✉</span>
        </div>
        <div class="field-error" id="emailErr">Vui lòng nhập email hợp lệ</div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Mật khẩu</label>
        <div class="field-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <span class="field-icon" id="togglePwd" onclick="togglePass()">👁</span>
        </div>
        <div class="field-error" id="pwdErr">Vui lòng nhập mật khẩu</div>
      </div>

      <div class="form-options">
        <label class="remember-label">
          <input type="checkbox" id="remember"> Ghi nhớ đăng nhập
        </label>
        <a href="#" class="forgot-link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">ĐĂNG NHẬP</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="divider-or">hoặc</div>
    <div class="form-footer">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/api';

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let valid = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    show('emailErr'); document.getElementById('email').classList.add('error-input'); valid = false;
  } else { hide('emailErr'); document.getElementById('email').classList.remove('error-input'); }

  if (!password) {
    show('pwdErr'); document.getElementById('password').classList.add('error-input'); valid = false;
  } else { hide('pwdErr'); document.getElementById('password').classList.remove('error-input'); }

  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading');

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });

    if (res.ok) {
      const data = await res.json();
      const user = data.user || data;
      localStorage.setItem('user', JSON.stringify(user));
      if (data.token) localStorage.setItem('token', data.token);
      if (user.role === 'ADMIN') {
        showAlert('Đăng nhập thành công! Chuyển đến trang quản trị...', 'success');
        setTimeout(() => location.href = 'admin/products.html', 1200);
      } else {
        showAlert('Đăng nhập thành công!', 'success');
        setTimeout(() => location.href = 'index.html', 1000);
      }
    } else {
      const msg = await res.text();
      showAlert(msg || 'Email hoặc mật khẩu không đúng!', 'danger');
    }
  } catch {
    // Demo login
    if (email === 'admin@pinkgold.com' && password === '123456') {
      const u = {id:1,username:'admin',fullName:'Quản Trị Viên',email,role:'ADMIN'};
      localStorage.setItem('user', JSON.stringify(u));
      showAlert('Đăng nhập thành công! Chuyển đến trang quản trị...', 'success');
      setTimeout(() => location.href = 'index.html', 1200);
    } else if (password === '123456' && email.includes('@')) {
      const u = {id:2,username:email.split('@')[0],fullName:'Khách hàng',email,role:'CUSTOMER'};
      localStorage.setItem('user', JSON.stringify(u));
      showAlert('Đăng nhập thành công!', 'success');
      setTimeout(() => location.href = 'index.html', 1000);
    } else {
      showAlert('Lỗi kết nối. Thử lại hoặc kiểm tra backend!', 'danger');
    }
  } finally {
    btn.classList.remove('loading');
  }
}

function togglePass() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('togglePwd');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.className = `alert-box ${type} show`;
  box.textContent = msg;
}
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}
</script>
</body>
</html>
