<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theo Dõi Đơn Hàng - PinkGold</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8b6914;
      --gold-pale: #fdf5e4; --pink: #d4637a; --cream: #faf6f0;
      --cream-dark: #f2ebe0; --dark: #1a1208; --dark-mid: #2d1a05;
      --text: #1a1208; --text-muted: #8a7a60; --line: #ede4d4;
      --shadow: 0 4px 20px rgba(26,18,8,.08); --shadow-lg: 0 8px 40px rgba(26,18,8,.14);
      --radius: 8px; --radius-lg: 12px; --transition: all .25s ease;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 70px; display: flex; align-items: center; padding: 0 40px; gap: 24px; background: rgba(250,246,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,.2); box-shadow: 0 2px 20px rgba(26,18,8,.07); }
    .navbar-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 600; color: var(--gold-dark); letter-spacing: 4px; }
    .navbar-nav { display: flex; gap: 4px; list-style: none; margin: 0 auto; }
    .navbar-nav a { display: block; padding: 8px 12px; border-radius: 6px; font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); transition: var(--transition); }
    .navbar-nav a:hover { color: var(--gold-dark); background: var(--gold-pale); }
    .navbar-actions { display: flex; align-items: center; gap: 6px; flex: none; }
    .nav-icon-btn { position: relative; width: 40px; height: 40px; border-radius: 50%; background: none; border: none; color: var(--text); font-size: 1.05rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); cursor: pointer; }
    .nav-icon-btn:hover { background: var(--gold-pale); color: var(--gold-dark); }
    .nav-badge { position: absolute; top: 2px; right: 2px; background: var(--pink); color: white; width: 17px; height: 17px; border-radius: 50%; font-size: .58rem; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 2px solid var(--cream); }
    .nav-user-btn { display: flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 20px; background: none; border: 1.5px solid var(--line); font-size: .8rem; color: var(--text); transition: var(--transition); cursor: pointer; white-space: nowrap; }
    .nav-user-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
    .user-dropdown { position: relative; }
    .user-menu { display: none; position: absolute; right: 0; top: calc(100% + 10px); background: white; border: 1.5px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-lg); min-width: 190px; overflow: hidden; z-index: 300; }
    .user-menu.open { display: block; animation: fadeUp .15s ease; }
    .user-menu a, .user-menu button { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: .875rem; color: var(--text); transition: background .15s; text-decoration: none; background: none; border: none; width: 100%; cursor: pointer; font-family: inherit; text-align: left; }
    .user-menu a:hover, .user-menu button:hover { background: var(--gold-pale); }
    .user-menu .divider { height: 1px; background: var(--line); margin: 4px 0; }
    .user-menu .logout { color: var(--pink); }

    .page-wrapper { padding-top: 70px; }
    .page-header { background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%); padding: 48px 0 40px; position: relative; overflow: hidden; }
    .page-header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,.12) 0%, transparent 70%); }
    .page-header-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 2; }
    .page-eyebrow { font-size: .62rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 400; color: white; }

    .content-area { max-width: 1200px; margin: 0 auto; padding: 40px 40px 80px; display: grid; grid-template-columns: 260px 1fr; gap: 32px; align-items: start; }

    .sidebar { background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); position: sticky; top: 90px; }
    .sidebar-avatar { background: linear-gradient(135deg, var(--dark), var(--dark-mid)); padding: 32px 24px; text-align: center; }
    .avatar-circle { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-light), var(--gold)); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--dark); border: 3px solid rgba(201,168,76,.4); }
    .sidebar-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: white; font-weight: 400; }
    .sidebar-email { font-size: .78rem; color: rgba(255,255,255,.45); margin-top: 4px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 13px 24px; font-size: .85rem; color: var(--text-muted); transition: var(--transition); border-left: 3px solid transparent; }
    .sidebar-nav a:hover { color: var(--gold-dark); background: var(--gold-pale); }
    .sidebar-nav a.active { color: var(--gold-dark); background: var(--gold-pale); border-left-color: var(--gold); font-weight: 500; }
    .sidebar-nav a i { font-size: 1rem; width: 18px; text-align: center; }
    .sidebar-nav .divider { height: 1px; background: var(--line); margin: 8px 0; }
    .sidebar-nav .logout { color: var(--pink); }
    .sidebar-nav .logout:hover { background: #fff0f3; }

    .main-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow); animation: fadeUp .4s ease; }
    .card-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--line); }
    .card-header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; }
    .card-subtitle { font-size: .82rem; color: var(--text-muted); margin-top: 4px; }

    .filter-row { padding: 16px 28px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
    .filter-search { position: relative; flex: 1; }
    .filter-search input { width: 100%; padding: 9px 14px 9px 36px; border: 1.5px solid var(--line); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: .875rem; outline: none; background: var(--cream); }
    .filter-search input:focus { border-color: var(--gold); }
    .filter-search i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: .85rem; }

    .order-list { padding: 20px 28px 28px; display: flex; flex-direction: column; gap: 18px; }

    .track-card { border: 1.5px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); }
    .track-card:hover { border-color: rgba(201,168,76,.35); box-shadow: var(--shadow); }
    .track-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; background: var(--cream-dark); gap: 12px; flex-wrap: wrap; }
    .track-code { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--gold-dark); }
    .track-date { font-size: .78rem; color: var(--text-muted); }
    .track-head-right { display: flex; align-items: center; gap: 10px; }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: .7rem; font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-confirmed { background: #d1ecf1; color: #0c5460; }
    .badge-shipping  { background: #dbeafe; color: #1d4ed8; }
    .badge-delivered { background: #d4edda; color: #155724; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }
    .badge-paid      { background: #d4edda; color: #155724; }
    .badge-unpaid    { background: #f8d7da; color: #721c24; }
    .badge-refunded  { background: #e2e3e5; color: #383d41; }

    .track-progress { padding: 28px 28px 8px; }
    .progress-steps { display: flex; align-items: flex-start; position: relative; }
    .progress-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; text-align: center; }
    .progress-step:not(:last-child)::after { content: ''; position: absolute; top: 17px; left: 50%; width: 100%; height: 2px; background: var(--line); z-index: 1; }
    .progress-step.done:not(:last-child)::after { background: var(--gold); }
    .progress-circle { width: 36px; height: 36px; border-radius: 50%; background: white; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text-muted); position: relative; z-index: 2; transition: var(--transition); margin-bottom: 10px; }
    .progress-step.done .progress-circle { background: var(--gold); border-color: var(--gold); color: var(--dark); }
    .progress-step.current .progress-circle { background: var(--dark); border-color: var(--dark); color: var(--gold-light); animation: pulse 1.8s ease-in-out infinite; }
    .progress-step.cancelled .progress-circle { background: var(--pink); border-color: var(--pink); color: white; }
    .progress-label { font-size: .72rem; letter-spacing: .5px; color: var(--text-muted); font-weight: 500; max-width: 90px; }
    .progress-step.done .progress-label, .progress-step.current .progress-label { color: var(--dark); font-weight: 600; }
    .progress-time { font-size: .65rem; color: var(--text-muted); margin-top: 2px; }

    .track-cancelled-note { margin: 0 28px 8px; padding: 12px 16px; background: #fff0f3; border-left: 3px solid var(--pink); border-radius: var(--radius); font-size: .82rem; color: #a3273f; display: flex; align-items: center; gap: 8px; }

    .track-body { padding: 16px 22px; border-top: 1px solid var(--line); }
    .order-items-preview { display: flex; flex-direction: column; gap: 10px; }
    .order-item-row { display: flex; align-items: center; gap: 14px; }
    .order-item-img { width: 48px; height: 48px; border-radius: var(--radius); background: var(--cream-dark); overflow: hidden; flex: none; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .order-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-item-info { flex: 1; min-width: 0; }
    .order-item-name { font-size: .86rem; font-weight: 500; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-item-meta { font-size: .75rem; color: var(--text-muted); }
    .order-item-price { font-size: .86rem; font-weight: 600; color: var(--gold-dark); white-space: nowrap; }
    .more-items { font-size: .78rem; color: var(--text-muted); padding: 4px 0; }

    .track-foot { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-top: 1px solid var(--line); gap: 12px; flex-wrap: wrap; }
    .track-total { font-size: .85rem; color: var(--text-muted); }
    .track-total strong { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold-dark); margin-left: 6px; }
    .track-actions { display: flex; gap: 8px; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--radius); border: none; font-size: .72rem; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; transition: var(--transition); cursor: pointer; }
    .btn-gold { background: var(--gold); color: var(--dark); }
    .btn-gold:hover { background: var(--gold-dark); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid var(--line); color: var(--text-muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold-dark); }
    .btn-danger { background: transparent; border: 1.5px solid var(--pink); color: var(--pink); }
    .btn-danger:hover { background: var(--pink); color: white; }
    .btn-sm { padding: 7px 14px; font-size: .68rem; }

    .empty-state { text-align: center; padding: 64px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; color: rgba(201,168,76,.3); }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--dark); margin-bottom: 8px; }
    .empty-sub { font-size: .875rem; margin-bottom: 24px; }

    .loading-state { text-align: center; padding: 64px 20px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: var(--radius-lg); width: 680px; max-width: 96%; max-height: 90vh; overflow-y: auto; animation: fadeUp .25s ease; }
    .modal-header { padding: 24px 28px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; }
    .modal-close { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--cream-dark); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); }
    .modal-close:hover { background: var(--line); }
    .modal-body { padding: 24px 28px 28px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .detail-box { background: var(--cream-dark); border-radius: var(--radius); padding: 12px 14px; }
    .detail-box-label { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
    .detail-box-value { font-size: .9rem; font-weight: 500; }
    .detail-box.full { grid-column: 1/-1; }
    .modal-items-title { font-size: .7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; }
    .modal-item-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .modal-item-row:last-child { border-bottom: none; }
    .modal-item-img { width: 56px; height: 56px; border-radius: var(--radius); background: var(--cream-dark); overflow: hidden; flex: none; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    .modal-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .modal-item-info { flex: 1; }
    .modal-item-name { font-size: .9rem; font-weight: 500; }
    .modal-item-meta { font-size: .78rem; color: var(--text-muted); }
    .modal-item-price { text-align: right; }
    .modal-item-unit { font-size: .78rem; color: var(--text-muted); }
    .modal-item-total { font-size: .9rem; font-weight: 600; color: var(--gold-dark); }
    .modal-summary { background: var(--cream-dark); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
    .summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .875rem; }
    .summary-row.total { font-weight: 600; border-top: 1px solid var(--line); margin-top: 6px; padding-top: 12px; font-size: 1rem; }
    .summary-row.total span:last-child { color: var(--gold-dark); font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; }

    .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 13px 20px; border-radius: var(--radius); font-size: .85rem; font-weight: 500; animation: fadeUp .3s ease; box-shadow: var(--shadow-lg); max-width: 340px; }
    .toast-success { background: var(--dark); color: var(--gold-light); border-left: 3px solid var(--gold); }
    .toast-error { background: #2d0810; color: #f0a0b0; border-left: 3px solid var(--pink); }

    @media (max-width: 900px) {
      .navbar { padding: 0 20px; }
      .navbar-nav { display: none; }
      .content-area { grid-template-columns: 1fr; padding: 24px 20px 60px; }
      .sidebar { position: static; }
      .page-header-inner { padding: 0 20px; }
      .detail-grid { grid-template-columns: 1fr; }
      .track-head, .track-foot { flex-direction: column; align-items: flex-start; }
      .track-head-right { flex-wrap: wrap; }
      .progress-label { font-size: .65rem; max-width: 64px; }
      .progress-circle { width: 30px; height: 30px; font-size: .85rem; }
    }
    @media (max-width: 560px) {
      .filter-row { padding: 12px 20px; }
      .order-list { padding: 16px 20px 24px; }
      .modal-body { padding: 20px; }
      .track-progress { padding: 22px 16px 8px; }
      .progress-label { display: none; }
    }
  </style>
</head>

<script>
const API      = 'http://localhost:8080/api';
const IMG_BASE = 'http://localhost:8080';
const CART_KEY = 'pinkgold_cart';

/* ── Image URL helper (giống product-detail.html) ── */
function imgUrl(raw) {
  if (!raw) return '';
  raw = String(raw).trim();
  if (raw.startsWith('http://') || raw.startsWith('https://') || raw.startsWith('//')) return raw;
  return IMG_BASE + '/' + raw.replace(/^\/+/, '');
}

/* ── Cache ảnh gallery (lấy từ product_images, không dùng image_url giấy KĐ) ── */
const _imgCache = {};
async function getProductPrimaryImg(pid) {
  if (!pid) return '';
  if (_imgCache[pid] !== undefined) return _imgCache[pid];
  try {
    const res = await fetch(`${API}/product-images/product/${pid}`);
    if (!res.ok) { _imgCache[pid] = ''; return ''; }
    const list = await res.json();
    const imgs = Array.isArray(list) ? list : (list.content || []);
    if (!imgs.length) { _imgCache[pid] = ''; return ''; }
    // Ưu tiên ảnh isPrimary, fallback ảnh đầu tiên
    imgs.sort((a, b) => (b.isPrimary ? 1 : 0) - (a.isPrimary ? 1 : 0));
    const primary = imgs[0];
    _imgCache[pid] = imgUrl(primary.imageUrl || primary.image_url || '');
  } catch { _imgCache[pid] = ''; }
  return _imgCache[pid];
}

/* ── Cart badge ── */
function cartTotal() {
  try { return (JSON.parse(localStorage.getItem(CART_KEY)) || []).reduce((s, i) => s + (i.quantity || 0), 0); } catch { return 0; }
}
function updateCartBadge() {
  const total = cartTotal();
  const b = document.getElementById('cartBadge');
  if (!b) return;
  b.textContent = total;
  b.style.display = total > 0 ? 'flex' : 'none';
}

/* ── Toast ── */
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 2800);
  setTimeout(() => t.remove(), 3200);
}

function formatPrice(v) {
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(Number(v || 0));
}
function formatDate(v) {
  if (!v) return '–';
  const d = new Date(v);
  return isNaN(d) ? String(v).slice(0, 10) : d.toLocaleDateString('vi-VN');
}
function formatDateTime(v) {
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

/* ── Navbar user ── */
function renderNavUser() {
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  const area = document.getElementById('navUserArea');
  if (!area) return;
  if (user) {
    const name = user.fullName || user.username || 'Tài khoản';
    area.innerHTML = `
      <div class="user-dropdown">
        <button class="nav-user-btn" onclick="toggleUserMenu(event)">
          <i class="bi bi-person-circle"></i><span>${escHtml(name)}</span>
          <i class="bi bi-chevron-down" style="font-size:.6rem;"></i>
        </button>
        <div class="user-menu" id="userMenu">
          <a href="profile.html"><i class="bi bi-person"></i> Tài Khoản</a>
          <a href="order-tracking.html"><i class="bi bi-truck"></i> Theo Dõi Đơn Hàng</a>
          <a href="purchase-history.html"><i class="bi bi-bag-check"></i> Lịch Sử Mua Hàng</a>
          <div class="divider"></div>
          <button class="logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng Xuất</button>
        </div>
      </div>`;
  } else {
    area.innerHTML = `<a href="login.html" style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;background:var(--gold);color:var(--dark);font-size:.72rem;letter-spacing:2px;text-transform:uppercase;font-family:inherit;"><i class="bi bi-person"></i> Đăng Nhập</a>`;
  }
}
function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userMenu')?.classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('userMenu')?.classList.remove('open'));
function logout() {
  if (confirm('Bạn có chắc muốn đăng xuất?')) {
    localStorage.removeItem('user'); localStorage.removeItem('token');
    location.href = 'index.html';
  }
}

/* ── State ── */
let allOrders = [];

const STATUS_LABELS  = { PENDING:'Chờ xác nhận', CONFIRMED:'Đã xác nhận', SHIPPING:'Đang giao', DELIVERED:'Đã giao', CANCELLED:'Đã hủy' };
const STATUS_CLASSES = { PENDING:'badge-pending', CONFIRMED:'badge-confirmed', SHIPPING:'badge-shipping', DELIVERED:'badge-delivered', CANCELLED:'badge-cancelled' };
const PAY_LABELS     = { UNPAID:'Chưa TT', PAID:'Đã TT', REFUNDED:'Hoàn tiền' };
const PAY_CLASSES    = { UNPAID:'badge-unpaid', PAID:'badge-paid', REFUNDED:'badge-refunded' };

const PROGRESS_STEPS = [
  { key:'PENDING',   label:'Đặt hàng',  icon:'bi-bag-check' },
  { key:'CONFIRMED', label:'Xác nhận',  icon:'bi-clipboard-check' },
  { key:'SHIPPING',  label:'Đang giao', icon:'bi-truck' },
  { key:'DELIVERED', label:'Đã giao',   icon:'bi-house-check' },
];

function statusBadge(s) { return `<span class="badge ${STATUS_CLASSES[s]||'badge-pending'}">${STATUS_LABELS[s]||s}</span>`; }
function payBadge(s)    { return `<span class="badge ${PAY_CLASSES[s]||'badge-unpaid'}">${PAY_LABELS[s]||s}</span>`; }

/* ── Load orders ── */
async function loadOrders() {
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user) { location.href = 'login.html'; return; }

  const name = user.fullName || user.username || 'Khách hàng';
  const initials = name.trim().split(/\s+/).slice(-2).map(w => w[0].toUpperCase()).join('');
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent   = name;
  document.getElementById('sidebarEmail').textContent  = user.email || '';

  try {
    const res = await fetch(`${API}/orders/my-orders?userId=${user.id}`);
    if (res.ok) {
      const data   = await res.json();
      const orders = Array.isArray(data) ? data : (data.content || []);
      allOrders = orders
        // Lọc theo userId phía frontend để chắc chắn chỉ hiện đơn của user đang đăng nhập
        .filter(o => {
          const oUid = o.user?.id ?? o.userId ?? o.user_id;
          return String(oUid) === String(user.id);
        })
        // Chỉ hiện đơn đang xử lý
        .filter(o => ['PENDING','CONFIRMED','SHIPPING','CANCELLED'].includes(getStatus(o)));
    } else {
      allOrders = [];
    }
  } catch { allOrders = []; }

  // Pre-load ảnh gallery cho tất cả sản phẩm trong danh sách đơn hàng
  const pids = [...new Set(
    allOrders
      .flatMap(o => getItems(o).map(i => i.product?.id ?? i.productId ?? i.product_id))
      .filter(Boolean)
  )];
  await Promise.all(pids.map(pid => getProductPrimaryImg(pid)));

  renderOrders();
}

function renderOrders() {
  const kw   = document.getElementById('searchInput').value.trim().toLowerCase();
  let   list = allOrders.filter(o => !kw || getOrderCode(o).toLowerCase().includes(kw));
  list.sort((a, b) => new Date(getCreatedAt(b) || 0) - new Date(getCreatedAt(a) || 0));

  const container = document.getElementById('orderList');
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="bi bi-truck"></i></div>
        <div class="empty-title">Không có đơn hàng nào cần theo dõi</div>
        <div class="empty-sub">Các đơn hàng đang xử lý sẽ hiển thị tại đây.</div>
        <a href="products.html" class="btn btn-gold"><i class="bi bi-gem"></i> Khám Phá Sản Phẩm</a>
      </div>`;
    return;
  }
  container.innerHTML = list.map(o => trackCardHTML(o)).join('');
}

function trackCardHTML(o) {
  const id       = o.id ?? '';
  const code     = getOrderCode(o);
  const status   = getStatus(o);
  const payStatus= getPayStatus(o);
  const createdAt= formatDate(getCreatedAt(o));
  const items    = getItems(o);
  const total    = getTotal(o);
  const canCancel= status === 'PENDING';

  const previewItems = items.slice(0, 2).map(item => {
    const pid  = item.product?.id ?? item.productId ?? item.product_id;
    const name = item.product?.name ?? item.productName ?? `Sản phẩm #${pid ?? ''}`;
    // Lấy ảnh từ cache gallery (không dùng imageUrl của bảng products)
    const img  = _imgCache[pid] || '';
    const qty  = item.quantity ?? 0;
    const price= Number(item.price ?? 0);
    return `
      <div class="order-item-row">
        <div class="order-item-img">
          ${img ? `<img src="${img}" alt="${escHtml(name)}" onerror="this.style.display='none'">` : '💍'}
        </div>
        <div class="order-item-info">
          <div class="order-item-name">${escHtml(name)}</div>
          <div class="order-item-meta">x${qty}</div>
        </div>
        <div class="order-item-price">${formatPrice(price * qty)}</div>
      </div>`;
  }).join('');

  const moreCount = items.length > 2 ? items.length - 2 : 0;

  return `
    <div class="track-card">
      <div class="track-head">
        <div>
          <div class="track-code">${escHtml(code)}</div>
          <div class="track-date"><i class="bi bi-calendar3" style="margin-right:4px;"></i>${createdAt}</div>
        </div>
        <div class="track-head-right">
          ${payBadge(payStatus)}
          ${statusBadge(status)}
        </div>
      </div>

      ${status === 'CANCELLED'
        ? `<div class="track-cancelled-note"><i class="bi bi-x-circle"></i> Đơn hàng này đã bị hủy.</div>`
        : `<div class="track-progress">${progressTrackerHTML(status, o)}</div>`}

      <div class="track-body">
        <div class="order-items-preview">
          ${previewItems}
          ${moreCount > 0 ? `<div class="more-items">+${moreCount} sản phẩm khác</div>` : ''}
        </div>
      </div>

      <div class="track-foot">
        <div class="track-total">Tổng cộng:<strong>${formatPrice(total)}</strong></div>
        <div class="track-actions">
          <button class="btn btn-outline btn-sm" onclick="openDetail(${id})"><i class="bi bi-eye"></i> Chi Tiết</button>
          ${canCancel ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder('${escHtml(code)}', ${id})"><i class="bi bi-x-circle"></i> Hủy</button>` : ''}
        </div>
      </div>
    </div>`;
}

function progressTrackerHTML(currentStatus, order) {
  const currentIndex = PROGRESS_STEPS.findIndex(s => s.key === currentStatus);
  return `<div class="progress-steps">
    ${PROGRESS_STEPS.map((step, idx) => {
      let cls = '';
      if (idx < currentIndex) cls = 'done';
      else if (idx === currentIndex) cls = 'current';
      let timeLabel = '';
      if (idx === 0) timeLabel = formatDateTime(getCreatedAt(order));
      else if (idx === currentIndex) timeLabel = formatDateTime(getUpdatedAt(order));
      const icon = (idx < currentIndex) ? 'bi-check-lg' : step.icon;
      return `
        <div class="progress-step ${cls}">
          <div class="progress-circle"><i class="bi ${icon}"></i></div>
          <div class="progress-label">${step.label}</div>
          ${timeLabel ? `<div class="progress-time">${timeLabel}</div>` : ''}
        </div>`;
    }).join('')}
  </div>`;
}

/* ── Detail modal ── */
async function openDetail(id) {
  const o = allOrders.find(x => Number(x.id) === Number(id));
  if (!o) return;

  // Load ảnh cho các sản phẩm chưa có trong cache
  const pids = getItems(o).map(i => i.product?.id ?? i.productId ?? i.product_id).filter(Boolean);
  await Promise.all(pids.map(pid => getProductPrimaryImg(pid)));

  const code      = getOrderCode(o);
  const status    = getStatus(o);
  const payStatus = getPayStatus(o);
  const items     = getItems(o);
  const total     = getTotal(o);
  const discount  = Number(o.discountAmount ?? o.discount_amount ?? 0);
  const shipping  = o.shippingAddress ?? o.shipping_address ?? '–';
  const note      = o.note ?? '–';

  document.getElementById('modalTitle').textContent = `Đơn Hàng ${code}`;

  const itemsHTML = items.map(item => {
    const pid  = item.product?.id ?? item.productId ?? item.product_id;
    const name = item.product?.name ?? item.productName ?? `Sản phẩm #${pid ?? ''}`;
    const img  = _imgCache[pid] || '';
    const qty  = item.quantity ?? 0;
    const price= Number(item.price ?? 0);
    return `
      <div class="modal-item-row">
        <div class="modal-item-img">
          ${img ? `<img src="${img}" alt="${escHtml(name)}" onerror="this.style.display='none'">` : '💍'}
        </div>
        <div class="modal-item-info">
          <div class="modal-item-name">${escHtml(name)}</div>
          <div class="modal-item-meta">${formatPrice(price)} × ${qty}</div>
        </div>
        <div class="modal-item-price">
          <div class="modal-item-unit">${qty} sản phẩm</div>
          <div class="modal-item-total">${formatPrice(price * qty)}</div>
        </div>
      </div>`;
  }).join('');

  const subtotal = items.reduce((s, i) => s + Number(i.price ?? 0) * Number(i.quantity ?? 0), 0);

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-box">
        <div class="detail-box-label">Mã đơn hàng</div>
        <div class="detail-box-value" style="color:var(--gold-dark);font-family:'Cormorant Garamond',serif;font-size:1.05rem;">${escHtml(code)}</div>
      </div>
      <div class="detail-box">
        <div class="detail-box-label">Ngày đặt</div>
        <div class="detail-box-value">${formatDate(getCreatedAt(o))}</div>
      </div>
      <div class="detail-box">
        <div class="detail-box-label">Trạng thái</div>
        <div class="detail-box-value">${statusBadge(status)}</div>
      </div>
      <div class="detail-box">
        <div class="detail-box-label">Thanh toán</div>
        <div class="detail-box-value">${payBadge(payStatus)}</div>
      </div>
      <div class="detail-box full">
        <div class="detail-box-label">Địa chỉ giao hàng</div>
        <div class="detail-box-value">${escHtml(shipping)}</div>
      </div>
      ${note !== '–' ? `<div class="detail-box full"><div class="detail-box-label">Ghi chú</div><div class="detail-box-value">${escHtml(note)}</div></div>` : ''}
    </div>
    ${status !== 'CANCELLED' ? `<div class="modal-items-title">Tiến Trình Đơn Hàng</div>${progressTrackerHTML(status, o)}<div style="height:24px"></div>` : ''}
    <div class="modal-items-title">Sản Phẩm Đặt Mua</div>
    ${itemsHTML || '<div style="color:var(--text-muted);font-size:.875rem;padding:12px 0;">Không có thông tin chi tiết sản phẩm.</div>'}
    <div class="modal-summary">
      <div class="summary-row"><span>Tạm tính</span><span>${formatPrice(subtotal)}</span></div>
      ${discount > 0 ? `<div class="summary-row"><span>Giảm giá</span><span style="color:var(--pink)">-${formatPrice(discount)}</span></div>` : ''}
      <div class="summary-row total"><span>Tổng cộng</span><span>${formatPrice(total)}</span></div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

/* ── Cancel order ── */
async function cancelOrder(code, id) {
  if (!confirm(`Bạn có chắc muốn hủy đơn hàng "${code}"?\nThao tác này không thể hoàn tác.`)) return;
  try {
    const res = await fetch(`${API}/orders/${code}/cancel`, { method: 'PUT' });
    if (res.ok) {
      const o = allOrders.find(x => Number(x.id) === Number(id));
      if (o) o.status = 'CANCELLED';
      renderOrders();
      showToast('Đã hủy đơn hàng thành công');
    } else {
      showToast('Không thể hủy đơn hàng này.', 'error');
    }
  } catch { showToast('Lỗi kết nối server.', 'error'); }
}

/* ── Helpers ── */
function getOrderCode(o) { return o.orderCode ?? o.order_code ?? `ORDER-${o.id ?? ''}`; }
function getStatus(o)    { return o.status ?? 'PENDING'; }
function getPayStatus(o) { return o.paymentStatus ?? o.payment_status ?? o.payment?.status ?? 'UNPAID'; }
function getCreatedAt(o) { return o.createdAt ?? o.created_at ?? ''; }
function getUpdatedAt(o) { return o.updatedAt ?? o.updated_at ?? o.createdAt ?? o.created_at ?? ''; }
function getItems(o)     { return o.orderItems ?? o.order_items ?? o.items ?? []; }
function getTotal(o)     { return Number(o.finalAmount ?? o.final_amount ?? o.totalAmount ?? o.total_amount ?? 0); }
function escHtml(v)      { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── Init ── */
renderNavUser();
updateCartBadge();
loadOrders();
</script>
</body>
</html>
