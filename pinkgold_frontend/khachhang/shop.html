<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sản Phẩm - PinkGold Trang Sức Cao Cấp</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dark: #8b6914;
      --pink: #d4637a;
      --pink-light: #f0a0b0;
      --cream: #faf6f0;
      --cream-2: #f5efe4;
      --dark: #1a1208;
      --dark-mid: #2d2010;
      --text-muted: #8a7a60;
      --line: rgba(201,168,76,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 72px; display: flex; align-items: center; padding: 0 40px;
      background: rgba(250,246,240,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600; color: var(--gold-dark);
      letter-spacing: 4px; text-decoration: none;
    }
    .nav-links {
      display: flex; gap: 32px; margin: 0 auto; list-style: none;
    }
    .nav-links a {
      font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dark); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold-dark); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-icon {
      background: none; border: none; cursor: pointer;
      color: var(--dark); font-size: 1.1rem; transition: color 0.2s;
      text-decoration: none; display: flex; align-items: center; position: relative;
    }
    .nav-icon:hover { color: var(--gold-dark); }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--pink); color: white; width: 16px; height: 16px;
      border-radius: 50%; font-size: 0.6rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── HERO BANNER ─── */
    .shop-banner {
      margin-top: 72px;
      background: linear-gradient(135deg, var(--dark) 0%, #2d1a05 60%, #3d2210 100%);
      padding: 56px 40px; position: relative; overflow: hidden;
    }
    .shop-banner::before {
      content: '';
      position: absolute; right: -50px; top: 50%; transform: translateY(-50%);
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,0.15), transparent 70%);
    }
    .shop-banner-inner { max-width: 1200px; margin: 0 auto; position: relative; }
    .shop-banner .eyebrow {
      font-size: 0.62rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(201,168,76,0.6); margin-bottom: 10px;
    }
    .shop-banner h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 300; color: var(--gold-light); margin-bottom: 8px;
    }
    .shop-banner h1 em { font-style: italic; color: var(--pink-light); }
    .shop-banner p { font-size: 0.85rem; color: rgba(255,255,255,0.4); }
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      margin-top: 20px; font-size: 0.75rem; color: rgba(255,255,255,0.3);
    }
    .breadcrumb a { color: rgba(201,168,76,0.6); text-decoration: none; }
    .breadcrumb a:hover { color: var(--gold-light); }
    .breadcrumb i { font-size: 0.6rem; }

    /* ─── LAYOUT ─── */
    .shop-layout {
      max-width: 1200px; margin: 0 auto; padding: 40px 40px;
      display: grid; grid-template-columns: 260px 1fr; gap: 40px;
    }

    /* ─── SIDEBAR / FILTER ─── */
    .sidebar { position: sticky; top: 92px; align-self: start; }
    .filter-section { margin-bottom: 32px; }
    .filter-title {
      font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold-dark); font-weight: 500; margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    }
    .filter-title i { font-size: 0.8rem; transition: transform 0.2s; }
    .filter-title.collapsed i { transform: rotate(-90deg); }
    .filter-body { display: flex; flex-direction: column; gap: 8px; }
    .filter-body.collapsed { display: none; }
    .filter-option {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      padding: 6px 0; transition: color 0.2s;
    }
    .filter-option:hover { color: var(--gold-dark); }
    .filter-option input[type="checkbox"] {
      appearance: none; width: 16px; height: 16px; flex: none;
      border: 1.5px solid #d4c9b0; border-radius: 3px; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .filter-option input[type="checkbox"]:checked {
      background: var(--gold); border-color: var(--gold);
    }
    .filter-option input[type="checkbox"]:checked::after {
      content: '✓'; position: absolute; top: -1px; left: 2px;
      font-size: 10px; color: white;
    }
    .filter-option-label { font-size: 0.84rem; color: var(--dark); }
    .filter-count {
      margin-left: auto; font-size: 0.72rem; color: var(--text-muted);
      background: var(--cream-2); padding: 1px 7px; border-radius: 10px;
    }
    .price-range-wrap { display: flex; flex-direction: column; gap: 12px; }
    .price-range-row { display: flex; align-items: center; gap: 8px; }
    .price-range-row input {
      flex: 1; padding: 8px 12px; border: 1.5px solid #e8dfd0;
      border-radius: 6px; font-size: 0.82rem; outline: none;
      font-family: 'DM Sans', sans-serif; background: white;
    }
    .price-range-row input:focus { border-color: var(--gold); }
    .price-range-row span { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
    .btn-apply-filter {
      width: 100%; padding: 10px; background: var(--dark); color: var(--gold-light);
      border: none; border-radius: 4px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 2px;
      text-transform: uppercase; transition: background 0.2s; margin-top: 8px;
    }
    .btn-apply-filter:hover { background: var(--dark-mid); }
    .btn-reset-filter {
      width: 100%; padding: 9px; background: transparent;
      border: 1px solid rgba(0,0,0,0.12); border-radius: 4px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 1px;
      color: var(--text-muted); transition: all 0.2s; margin-top: 6px;
    }
    .btn-reset-filter:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* ─── PRODUCTS AREA ─── */
    .products-area {}
    .products-toolbar {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .products-count { font-size: 0.82rem; color: var(--text-muted); margin-right: auto; }
    .products-count strong { color: var(--dark); }
    .search-wrap {
      position: relative; flex: 0 0 280px;
    }
    .search-wrap input {
      width: 100%; padding: 10px 38px 10px 14px;
      border: 1.5px solid #e8dfd0; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none;
      background: white;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap i {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.9rem; pointer-events: none;
    }
    .sort-select {
      padding: 10px 14px; border: 1.5px solid #e8dfd0; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; outline: none;
      background: white; cursor: pointer;
    }
    .sort-select:focus { border-color: var(--gold); }
    .view-toggles { display: flex; gap: 4px; }
    .view-toggle {
      width: 36px; height: 36px; border: 1.5px solid #e8dfd0; border-radius: 6px;
      background: white; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: var(--text-muted); font-size: 1rem; transition: all 0.2s;
    }
    .view-toggle.active, .view-toggle:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* ─── ACTIVE FILTERS ─── */
    .active-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; min-height: 0;
    }
    .filter-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3); border-radius: 20px;
      font-size: 0.75rem; color: var(--gold-dark); cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tag:hover { background: rgba(201,168,76,0.2); }
    .filter-tag i { font-size: 0.7rem; }

    /* ─── GRID / LIST VIEW ─── */
    .products-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      transition: all 0.3s;
    }
    .products-grid.view-list {
      grid-template-columns: 1fr;
    }
    .product-card {
      background: white; border-radius: 4px; overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06); transition: all 0.3s; cursor: pointer;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.1); }
    .product-img {
      position: relative; height: 260px; overflow: hidden;
      background: var(--cream-2); display: flex; align-items: center; justify-content: center;
    }
    .product-img i { font-size: 3rem; color: rgba(201,168,76,0.3); }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-actions {
      position: absolute; bottom: -48px; left: 0; right: 0;
      display: flex; transition: bottom 0.3s;
    }
    .product-card:hover .product-actions { bottom: 0; }
    .product-actions button {
      flex: 1; padding: 14px; background: var(--dark); color: var(--gold-light);
      border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase;
      transition: background 0.2s;
    }
    .product-actions button:hover { background: var(--dark-mid); }
    .product-actions .wish-btn {
      flex: 0 0 48px; background: white; color: var(--pink);
      border-left: 1px solid rgba(0,0,0,0.08);
    }
    .product-badge {
      position: absolute; top: 12px; left: 12px;
      padding: 4px 10px; border-radius: 2px; font-size: 0.62rem;
      letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
    }
    .badge-sale { background: var(--pink); color: white; }
    .badge-new { background: var(--dark); color: var(--gold-light); }
    .product-info { padding: 14px 16px; }
    .product-cat { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .product-name {
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem;
      font-weight: 400; margin-bottom: 8px; line-height: 1.3; color: var(--dark);
    }
    .product-price { display: flex; align-items: center; gap: 8px; }
    .price-current { font-size: 0.95rem; font-weight: 500; color: var(--gold-dark); }
    .price-old { font-size: 0.78rem; color: #bbb; text-decoration: line-through; }
    .product-rating { display: flex; gap: 2px; margin-top: 6px; align-items: center; }
    .product-rating i { color: var(--gold); font-size: 0.65rem; }
    .product-rating span { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; }

    /* LIST view overrides */
    .view-list .product-card {
      display: grid; grid-template-columns: 220px 1fr;
    }
    .view-list .product-img { height: 100%; min-height: 180px; }
    .view-list .product-info { padding: 24px; display: flex; flex-direction: column; justify-content: center; }

    /* ─── EMPTY STATE ─── */
    .empty-products {
      grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text-muted);
    }
    .empty-products i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.4; }
    .empty-products p { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 8px; color: var(--dark); }
    .empty-products small { font-size: 0.82rem; }

    /* ─── PAGINATION ─── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; margin-top: 48px;
    }
    .page-btn {
      width: 40px; height: 40px; border: 1.5px solid #e8dfd0; border-radius: 4px;
      background: white; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; color: var(--dark); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover, .page-btn.active { border-color: var(--gold); background: var(--gold); color: white; }
    .page-btn:disabled { opacity: 0.4; cursor: default; }
    .page-btn.active { background: var(--dark); border-color: var(--dark); color: var(--gold-light); }

    /* ─── SKELETON ─── */
    .skeleton {
      background: linear-gradient(90deg, #f0e8d8 25%, #f8f4ed 50%, #f0e8d8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .product-skeleton-card { border-radius: 4px; overflow: hidden; }
    .skel-img { height: 260px; }
    .skel-text-1 { height: 12px; margin: 14px 16px 8px; border-radius: 4px; width: 60%; }
    .skel-text-2 { height: 18px; margin: 0 16px 8px; border-radius: 4px; width: 85%; }
    .skel-text-3 { height: 14px; margin: 0 16px 14px; border-radius: 4px; width: 40%; }

    /* ─── MOBILE FILTER ─── */
    .filter-toggle-mobile {
      display: none; width: 100%; padding: 12px 20px; background: var(--dark);
      color: var(--gold-light); border: none; border-radius: 4px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 20px;
      align-items: center; justify-content: center; gap: 8px;
    }

    @media (max-width: 1024px) {
      .shop-layout { grid-template-columns: 220px 1fr; gap: 24px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .shop-banner { padding: 40px 20px; }
      .shop-banner h1 { font-size: 2rem; }
      .shop-layout { grid-template-columns: 1fr; padding: 20px; }
      .sidebar { position: static; display: none; }
      .sidebar.open { display: block; }
      .filter-toggle-mobile { display: flex; }
      .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .view-list .product-card { grid-template-columns: 1fr; }
      .view-list .product-img { height: 200px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">PINKGOLD</a>
    <ul class="nav-links">
      <li><a href="index.html">Trang Chủ</a></li>
      <li><a href="shop.html" class="active">Sản Phẩm</a></li>
      <li><a href="shop.html?cat=cuoi">Trang Sức Cưới</a></li>
      <li><a href="#">Về Chúng Tôi</a></li>
    </ul>
    <div class="nav-right">
      <a href="login.html" class="nav-icon"><i class="bi bi-person"></i></a>
      <a href="cart.html" class="nav-icon" style="position:relative">
        <i class="bi bi-bag"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <div class="shop-banner">
    <div class="shop-banner-inner">
      <p class="eyebrow">PinkGold Collection</p>
      <h1>Bộ sưu tập <em>trang sức</em></h1>
      <p>Vàng 18K, kim cương và đá quý thiên nhiên — chế tác thủ công.</p>
      <div class="breadcrumb">
        <a href="index.html">Trang chủ</a>
        <i class="bi bi-chevron-right"></i>
        <span>Sản phẩm</span>
      </div>
    </div>
  </div>

  <!-- SHOP LAYOUT -->
  <div class="shop-layout">

    <!-- SIDEBAR FILTER -->
    <button class="filter-toggle-mobile" onclick="toggleMobileFilter()">
      <i class="bi bi-sliders"></i> Bộ lọc sản phẩm
    </button>

    <aside class="sidebar" id="sidebar">

      <div class="filter-section">
        <div class="filter-title" onclick="toggleFilter(this)">
          Danh Mục <i class="bi bi-chevron-down"></i>
        </div>
        <div class="filter-body" id="catFilterBody"></div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleFilter(this)">
          Chất Liệu <i class="bi bi-chevron-down"></i>
        </div>
        <div class="filter-body">
          <label class="filter-option">
            <input type="checkbox" value="Vàng 18K" onchange="applyFilters()">
            <span class="filter-option-label">Vàng 18K</span>
            <span class="filter-count">12</span>
          </label>
          <label class="filter-option">
            <input type="checkbox" value="Vàng 24K" onchange="applyFilters()">
            <span class="filter-option-label">Vàng 24K</span>
            <span class="filter-count">4</span>
          </label>
          <label class="filter-option">
            <input type="checkbox" value="Bạc 925" onchange="applyFilters()">
            <span class="filter-option-label">Bạc 925</span>
            <span class="filter-count">8</span>
          </label>
          <label class="filter-option">
            <input type="checkbox" value="Kim cương" onchange="applyFilters()">
            <span class="filter-option-label">Kim cương</span>
            <span class="filter-count">5</span>
          </label>
          <label class="filter-option">
            <input type="checkbox" value="Ngọc bích" onchange="applyFilters()">
            <span class="filter-option-label">Ngọc bích</span>
            <span class="filter-count">3</span>
          </label>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleFilter(this)">
          Khoảng Giá <i class="bi bi-chevron-down"></i>
        </div>
        <div class="filter-body">
          <div class="price-range-wrap">
            <div class="price-range-row">
              <input type="number" id="priceMin" placeholder="Từ" min="0" step="100000">
              <span>–</span>
              <input type="number" id="priceMax" placeholder="Đến" min="0" step="100000">
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
              <label class="filter-option">
                <input type="radio" name="priceRange" value="0-1000000" onchange="setPriceRange(0,1000000)">
                <span class="filter-option-label">Dưới 1 triệu</span>
              </label>
              <label class="filter-option">
                <input type="radio" name="priceRange" value="1000000-3000000" onchange="setPriceRange(1000000,3000000)">
                <span class="filter-option-label">1 – 3 triệu</span>
              </label>
              <label class="filter-option">
                <input type="radio" name="priceRange" value="3000000-10000000" onchange="setPriceRange(3000000,10000000)">
                <span class="filter-option-label">3 – 10 triệu</span>
              </label>
              <label class="filter-option">
                <input type="radio" name="priceRange" value="10000000-99999999" onchange="setPriceRange(10000000,99999999)">
                <span class="filter-option-label">Trên 10 triệu</span>
              </label>
            </div>
          </div>
          <button class="btn-apply-filter" onclick="applyFilters()">Áp dụng</button>
          <button class="btn-reset-filter" onclick="resetFilters()">Xóa bộ lọc</button>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-title" onclick="toggleFilter(this)">
          Đánh Giá <i class="bi bi-chevron-down"></i>
        </div>
        <div class="filter-body">
          <label class="filter-option" style="gap:4px;">
            <input type="radio" name="rating" value="5" onchange="applyFilters()">
            <span style="color:var(--gold);font-size:.8rem;">★★★★★</span>
          </label>
          <label class="filter-option" style="gap:4px;">
            <input type="radio" name="rating" value="4" onchange="applyFilters()">
            <span style="color:var(--gold);font-size:.8rem;">★★★★</span>
            <span class="filter-option-label" style="font-size:.75rem;"> trở lên</span>
          </label>
          <label class="filter-option" style="gap:4px;">
            <input type="radio" name="rating" value="3" onchange="applyFilters()">
            <span style="color:var(--gold);font-size:.8rem;">★★★</span>
            <span class="filter-option-label" style="font-size:.75rem;"> trở lên</span>
          </label>
        </div>
      </div>

    </aside>

    <!-- PRODUCTS AREA -->
    <div class="products-area">

      <div class="products-toolbar">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Tìm tên sản phẩm..." oninput="handleSearch()">
          <i class="bi bi-search"></i>
        </div>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="default">Mặc định</option>
          <option value="price-asc">Giá: Thấp → Cao</option>
          <option value="price-desc">Giá: Cao → Thấp</option>
          <option value="newest">Mới nhất</option>
          <option value="name-asc">Tên A–Z</option>
        </select>
        <div class="view-toggles">
          <button class="view-toggle active" id="gridToggle" onclick="setView('grid')" title="Lưới">
            <i class="bi bi-grid-3x3-gap"></i>
          </button>
          <button class="view-toggle" id="listToggle" onclick="setView('list')" title="Danh sách">
            <i class="bi bi-list-ul"></i>
          </button>
        </div>
        <div class="products-count" id="productsCount"><strong>0</strong> sản phẩm</div>
      </div>

      <div class="active-filters" id="activeFilters"></div>

      <div class="products-grid" id="productsGrid">
        <!-- skeleton -->
        <div class="product-skeleton-card">
          <div class="skeleton skel-img"></div>
          <div class="skeleton skel-text-1"></div>
          <div class="skeleton skel-text-2"></div>
          <div class="skeleton skel-text-3"></div>
        </div>
        <div class="product-skeleton-card">
          <div class="skeleton skel-img"></div>
          <div class="skeleton skel-text-1"></div>
          <div class="skeleton skel-text-2"></div>
          <div class="skeleton skel-text-3"></div>
        </div>
        <div class="product-skeleton-card">
          <div class="skeleton skel-img"></div>
          <div class="skeleton skel-text-1"></div>
          <div class="skeleton skel-text-2"></div>
          <div class="skeleton skel-text-3"></div>
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>

  </div>

  <script>
    const API = 'http://localhost:8080/api';
    let allProducts = [];
    let allCategories = [];
    let filteredProducts = [];
    let currentPage = 1;
    const PAGE_SIZE = 9;
    let viewMode = 'grid';

    async function init() {
      await loadCategories();
      await loadProducts();
      checkUrlParams();
    }

    async function loadCategories() {
      try {
        const res = await fetch(`${API}/categories`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        allCategories = Array.isArray(data) ? data : (data.content || []);
      } catch {
        allCategories = [
          { id: 1, name: 'Nhẫn' }, { id: 2, name: 'Dây Chuyền' },
          { id: 3, name: 'Lắc Tay & Vòng Tay' }, { id: 4, name: 'Bông Tai' },
          { id: 5, name: 'Mặt Dây Chuyền' }, { id: 6, name: 'Trang Sức Cưới' },
          { id: 7, name: 'Trang Sức Bạc' }
        ];
      }
      renderCategoryFilter();
    }

    function renderCategoryFilter() {
      const container = document.getElementById('catFilterBody');
      container.innerHTML = allCategories.map(c => `
        <label class="filter-option">
          <input type="checkbox" value="${c.id}" name="category" onchange="applyFilters()">
          <span class="filter-option-label">${c.name}</span>
        </label>`).join('');
    }

    async function loadProducts() {
      try {
        const res = await fetch(`${API}/products`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        allProducts = Array.isArray(data) ? data : (data.content || data.data || []);
      } catch {
        allProducts = getMockProducts();
      }
      filteredProducts = allProducts;
      renderProducts(filteredProducts);
    }

    function checkUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const keyword = params.get('search');
      const cat = params.get('cat');
      if (keyword) {
        document.getElementById('searchInput').value = keyword;
      }
      applyFilters();
    }

    function applyFilters() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const sort = document.getElementById('sortSelect').value;
      const selectedCats = [...document.querySelectorAll('input[name="category"]:checked')].map(i => Number(i.value));
      const selectedMaterials = [...document.querySelectorAll('input[type="checkbox"]:checked:not([name="category"])')].map(i => i.value);
      const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
      const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;

      let result = allProducts.filter(p => {
        const name = (p.name || '').toLowerCase();
        const material = (p.material || '').toLowerCase();
        const catId = p.category?.id ?? p.categoryId ?? p.category_id;
        const effectivePrice = Number(p.discountPrice ?? p.discount_price ?? p.price ?? 0);

        const matchKeyword = !keyword || name.includes(keyword) || material.includes(keyword);
        const matchCat = !selectedCats.length || selectedCats.includes(Number(catId));
        const matchMaterial = !selectedMaterials.length || selectedMaterials.some(m => material.includes(m.toLowerCase()));
        const matchPrice = effectivePrice >= priceMin && effectivePrice <= priceMax;

        return matchKeyword && matchCat && matchMaterial && matchPrice && p.status !== false;
      });

      switch (sort) {
        case 'price-asc':
          result.sort((a, b) => getPrice(a) - getPrice(b)); break;
        case 'price-desc':
          result.sort((a, b) => getPrice(b) - getPrice(a)); break;
        case 'name-asc':
          result.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
        case 'newest':
          result.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)); break;
      }

      filteredProducts = result;
      currentPage = 1;
      renderProducts(filteredProducts);
      renderActiveFilters(keyword, selectedCats, selectedMaterials, priceMin, priceMax === Infinity ? 0 : priceMax);
    }

    function handleSearch() {
      applyFilters();
    }

    function getPrice(p) {
      return Number(p.discountPrice ?? p.discount_price ?? p.price ?? 0);
    }

    function renderProducts(products) {
      const totalPages = Math.ceil(products.length / PAGE_SIZE);
      if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
      const pageData = products.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
      const count = products.length;

      document.getElementById('productsCount').innerHTML = `<strong>${count}</strong> sản phẩm`;

      const grid = document.getElementById('productsGrid');

      if (!pageData.length) {
        grid.innerHTML = `
          <div class="empty-products">
            <i class="bi bi-search"></i>
            <p>Không tìm thấy sản phẩm</p>
            <small>Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</small>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      grid.innerHTML = pageData.map(p => {
        const price = Number(p.price || 0);
        const disc = p.discountPrice ?? p.discount_price;
        const isNew = !disc && Math.random() > 0.7;
        const isSale = !!disc;
        return `
          <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
            <div class="product-img">
              ${p.imageUrl || p.image_url
                ? `<img src="${p.imageUrl || p.image_url}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<i class=&quot;bi bi-gem&quot; style=&quot;font-size:3rem;color:rgba(201,168,76,0.3)&quot;></i>'">`
                : `<i class="bi bi-gem"></i>`}
              ${isSale ? `<span class="product-badge badge-sale">SALE</span>` : isNew ? `<span class="product-badge badge-new">MỚI</span>` : ''}
              <div class="product-actions">
                <button onclick="event.stopPropagation();addToCart(${p.id}, '${escJs(p.name || '')}')">Thêm vào giỏ</button>
                <button class="wish-btn" onclick="event.stopPropagation()"><i class="bi bi-heart"></i></button>
              </div>
            </div>
            <div class="product-info">
              <div class="product-cat">${p.material || 'Trang sức'}</div>
              <div class="product-name">${p.name || ''}</div>
              <div class="product-price">
                <span class="price-current">${formatPrice(disc || price)}</span>
                ${disc ? `<span class="price-old">${formatPrice(price)}</span>` : ''}
              </div>
              <div class="product-rating">
                <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
                <i class="bi bi-star-half"></i>
                <span>(12)</span>
              </div>
            </div>
          </div>`;
      }).join('');

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.innerHTML = ''; return; }

      let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        <i class="bi bi-chevron-left"></i></button>`;

      for (let i = 1; i <= totalPages; i++) {
        if (totalPages > 7) {
          if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
          } else if (i === 2 || i === totalPages - 1) {
            html += `<span style="color:var(--text-muted);padding:0 4px;">…</span>`;
          }
        } else {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        }
      }

      html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
        <i class="bi bi-chevron-right"></i></button>`;

      pg.innerHTML = html;
    }

    function goPage(n) {
      currentPage = n;
      renderProducts(filteredProducts);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderActiveFilters(keyword, cats, materials, priceMin, priceMax) {
      const container = document.getElementById('activeFilters');
      const tags = [];

      if (keyword) tags.push({ label: `"${keyword}"`, clear: () => { document.getElementById('searchInput').value = ''; applyFilters(); } });
      cats.forEach(catId => {
        const cat = allCategories.find(c => c.id === catId);
        if (cat) tags.push({ label: cat.name, clear: () => { document.querySelector(`input[name="category"][value="${catId}"]`).checked = false; applyFilters(); } });
      });
      materials.forEach(m => tags.push({ label: m, clear: () => { document.querySelector(`input[type="checkbox"][value="${m}"]`).checked = false; applyFilters(); } }));
      if (priceMin) tags.push({ label: `Từ ${formatPrice(priceMin)}`, clear: () => { document.getElementById('priceMin').value = ''; applyFilters(); } });
      if (priceMax) tags.push({ label: `Đến ${formatPrice(priceMax)}`, clear: () => { document.getElementById('priceMax').value = ''; applyFilters(); } });

      container.innerHTML = tags.map((t, i) => `
        <span class="filter-tag" onclick="filterTagClear(${i})">
          ${t.label} <i class="bi bi-x"></i>
        </span>`).join('');

      window.__filterTagClears = tags.map(t => t.clear);
    }

    window.filterTagClear = (i) => { window.__filterTagClears[i](); };

    function resetFilters() {
      document.querySelectorAll('input[name="category"]').forEach(i => i.checked = false);
      document.querySelectorAll('input[type="checkbox"]:not([name="category"])').forEach(i => i.checked = false);
      document.querySelectorAll('input[name="priceRange"]').forEach(i => i.checked = false);
      document.querySelectorAll('input[name="rating"]').forEach(i => i.checked = false);
      document.getElementById('priceMin').value = '';
      document.getElementById('priceMax').value = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSelect').value = 'default';
      applyFilters();
    }

    function setPriceRange(min, max) {
      document.getElementById('priceMin').value = min;
      document.getElementById('priceMax').value = max === 99999999 ? '' : max;
      applyFilters();
    }

    function toggleFilter(el) {
      el.classList.toggle('collapsed');
      const body = el.nextElementSibling;
      body.classList.toggle('collapsed');
    }

    function toggleMobileFilter() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function setView(mode) {
      viewMode = mode;
      const grid = document.getElementById('productsGrid');
      grid.classList.toggle('view-list', mode === 'list');
      document.getElementById('gridToggle').classList.toggle('active', mode === 'grid');
      document.getElementById('listToggle').classList.toggle('active', mode === 'list');
    }

    function addToCart(productId, name) {
      const count = parseInt(localStorage.getItem('cartCount') || '0') + 1;
      localStorage.setItem('cartCount', count);
      document.getElementById('cartBadge').textContent = count;
      showToast(`Đã thêm "${name}" vào giỏ hàng!`);
    }

    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;bottom:32px;right:32px;background:var(--dark);color:var(--gold-light);padding:14px 24px;border-radius:4px;font-size:.85rem;z-index:9999;transition:opacity 0.3s;max-width:300px;line-height:1.4;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    function formatPrice(v) {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(Number(v || 0));
    }

    function escJs(s) {
      return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function getMockProducts() {
      return [
        { id: 1, name: 'Nhẫn Vàng 18K Đá CZ Tròn', material: 'Vàng 18K', price: 2450000, discountPrice: 2190000, categoryId: 1, status: true },
        { id: 2, name: 'Nhẫn Kim Cương 4.5ly Thiên Nhiên', material: 'Vàng trắng 18K + Kim cương', price: 18500000, discountPrice: 17200000, categoryId: 1, status: true },
        { id: 3, name: 'Dây Chuyền Vàng 18K Trái Tim', material: 'Vàng 18K', price: 3250000, discountPrice: 2890000, categoryId: 2, status: true },
        { id: 4, name: 'Dây Chuyền Bạc 925 Ngôi Sao', material: 'Bạc 925', price: 890000, discountPrice: 690000, categoryId: 2, status: true },
        { id: 5, name: 'Lắc Tay Vàng Charm Bear', material: 'Vàng 18K', price: 2850000, discountPrice: 2590000, categoryId: 3, status: true },
        { id: 6, name: 'Vòng Tay Ngọc Bích Thiên Nhiên', material: 'Ngọc Bích', price: 4500000, discountPrice: null, categoryId: 3, status: true },
        { id: 7, name: 'Bông Tai Vàng Hoa Hồng', material: 'Vàng 18K', price: 1650000, discountPrice: 1490000, categoryId: 4, status: true },
        { id: 8, name: 'Bông Tai Kim Cương 3ly', material: 'Vàng trắng + Kim cương', price: 9800000, discountPrice: 9200000, categoryId: 4, status: true },
        { id: 9, name: 'Mặt Dây Chuyền Phật Bản Mệnh', material: 'Vàng 18K', price: 1350000, discountPrice: 1190000, categoryId: 5, status: true },
        { id: 10, name: 'Nhẫn Cưới Vàng Trơn Đôi', material: 'Vàng 18K', price: 4850000, discountPrice: 4590000, categoryId: 6, status: true },
        { id: 11, name: 'Lắc Tay Bạc 925 Charm Moon', material: 'Bạc 925', price: 750000, discountPrice: 650000, categoryId: 7, status: true },
        { id: 12, name: 'Nhẫn Nam Vàng 18K Đơn Giản', material: 'Vàng 18K', price: 3250000, discountPrice: 2990000, categoryId: 1, status: true },
        { id: 13, name: 'Dây Chuyền Vàng Nam Bản To', material: 'Vàng 18K', price: 4250000, discountPrice: 3890000, categoryId: 2, status: true },
        { id: 14, name: 'Bông Tai Bạc 925 Kiểu Hàn', material: 'Bạc 925', price: 450000, discountPrice: 390000, categoryId: 4, status: true },
        { id: 15, name: 'Vòng Tay Vàng 18K Nam Nữ', material: 'Vàng 18K', price: 3650000, discountPrice: 3290000, categoryId: 3, status: true },
      ];
    }

    document.getElementById('cartBadge').textContent = localStorage.getItem('cartCount') || '0';

    init();
  </script>
</body>
